# BOT TUNING — the autopilot's positioning knobs (see the `bot-improvement`
# skill). This is the HAND-AUTHORED source of truth; `npm run levels` compiles
# it to `src/generated/botTuning.ts`, which `src/game/bot.ts` resolves per level
# via `resolveBotTuning()`. Mirrors how `ladder.yaml` overrides ladder values.
#
#   default:  the global baseline layered over the engine's neutral defaults
#             (src/game/bot-tuning.ts BOT_TUNING_DEFAULTS). Omit a knob to keep
#             the engine default.
#   levels:   per-level PARTIAL overrides keyed by level id — only the knobs a
#             map needs bent. Everything else falls through to `default`.
#
# Every key must exist on the engine `BotTuning` type and every level id must be
# a real level, or the build fails (generate-bot-tuning.mjs).

# The global baseline. Left empty = the engine's shipped defaults verbatim; add
# a knob here to shift it for EVERY level at once.
default:
  # How far (px) the hero holds off the nearest body. `graspStandoff` is the
  # floor (just beyond a foe's ~34px grasp); a ranged/magic loadout instead
  # holds at `range * engageRangeFrac` so it kills from near max reach.
  graspStandoff: 72
  engageRangeFrac: 0.8
  # MELEE is a HOLD-AND-GRIND lane, not a dart-in-dart-out one. A blade reaches
  # barely past arm's length (a starter sword ~38px), so the ranged `graspStandoff`
  # (72) sat BEYOND where it lands — the melee hero fled everything and only
  # connected when a mob ran him down. Instead he PRESSES IN to `reach *
  # meleeHoldFrac` and grinds there so the auto-swing's cone mows the front line,
  # giving ground only when a body crowds inside the tight `meleeGraspStandoff`
  # bubble (clamped below the hold so a swinging band always survives).
  meleeHoldFrac: 0.82
  meleeGraspStandoff: 54
  # HARD CEILING on the hold, as a fraction of the hero's ACTUAL reach (base
  # range widened by STR/INT). The reach-aware hold is clamped here so no posture
  # standoff (flee's 1.7×) can push the hero past where his weapon connects — he
  # stays close enough to HIT the pack instead of standing off out of range.
  maxEngageRangeFrac: 0.85
  # AoE/CONE hold: a spread weapon (shotgun fan / fire-hose cone — `count > 1` or
  # a `spreadDeg`) fires a FIXED pellet count, so closing in concentrates them on
  # the pack and catches mobs 2/3/4 instead of clipping the front body at max
  # reach. Facing a real cluster it holds at `reach * aoeEngageFrac` (nearer than
  # `engageRangeFrac`); a lone foe keeps the normal, safer standoff.
  aoeEngageFrac: 0.5
  # Deadband (px) around the engage hold inside which the hero STANDS STILL and
  # fires instead of shuffling — he only closes in when a foe is beyond
  # `engageDist + holdBand`, or gives ground when one is inside `engageDist -
  # holdBand`. Wider = plants more readily; 0 = the old always-moving skirmish.
  holdBand: 28
  # JUMP RESERVE. A takeoff spends 10% of the pool and only STANDING STILL refills
  # it, so hopping to break every scuffle winds the hero out (empty pool → jog-
  # capped → run down) right when the ring closes. He keeps this fraction of the
  # pool in reserve before spending a discretionary jump — the surround break-out
  # and the boss reposition hop only fire above it, and only when a body is
  # actually about to bite; otherwise he opens the gap on FOOT. Jumps are saved
  # for escaping a genuine SURROUND. (A stampede/bale a jump is the ONLY escape
  # for still hops regardless.)
  hopStaminaReserve: 0.35
  # JUMP COMMIT PROBE (px). A discretionary jump must be able to GAIN GROUND to
  # be worth its stamina: before the takeoff the bot sweeps a body-width probe
  # this deep toward the intended landing spot and refuses the hop when a solid
  # wall/rock blocks it — a jump into a wall just rises in place. Roughly one
  # hop's worth of horizontal travel.
  hopCommitDist: 90
  # JUMP COOLDOWN (ms). Even in sustained trouble, discretionary hops come no
  # closer together than this — one escape hop, then feet until the next is
  # earned. Jumps are for breaking a genuine surround (or a bite while
  # bleeding), never a movement habit; a hero who bunny-hops is winding himself
  # out for nothing. Mechanic dodges only a jump escapes (stampede, bale)
  # bypass the cooldown but still restart it. 0 disables.
  hopCooldownMs: 4000
  # PASS-OVER TOP-OFF. With a medkit/potion/repair-kit stack FULL and the same
  # kind lying underfoot (or inside a running magnet's pull), the bot spends
  # ONE — only when the bar it feeds has real room — and the walked-over pickup
  # refills the stack. Rate-limited by this cooldown (ms) so a field littered
  # with kits after one scuffle doesn't turn the march into a top-off crawl:
  # capped supplies stay very low priority, and the switch never steers — it
  # only fires in passing. 0 disables.
  topOffCooldownMs: 10000
  # CHESTS. An un-looted chest within this range (px) on a QUIET field (no
  # threat in the local ring, clear straight sweep) is cracked on the spot: the
  # hero closes to weapon range and plants while the auto-attack smashes it
  # open — a loot locker is never walked past. The macro content sweep still
  # routes to the far ones. 0 disables the detour.
  chestDetourDist: 320
  # BLEEDING → JUMP. At/below this HP fraction, a body about to bite is met with a
  # hop (untouchable airborne frames to escape the hit) rather than just a foot
  # retreat — taking damage while low is a cue to jump out. Above it a hop needs a
  # genuine surround; below it, bleeding alone warrants one.
  hopHpFrac: 0.5
  # FLINCH ON DAMAGE. Extra px added to the danger bubble in the ~250ms right after
  # the hero takes a hit, so a trade makes him peel a few px off the pack instead
  # of standing in it. Small, so the hold doesn't unravel — just a nudge back.
  hurtBackoffPx: 24
  # While disarmed (a scripted opening), approach the pack's EDGE to this and
  # wait for the scripted rusher — do not barge into the middle unarmed.
  armApproachStandoff: 140
  # Bodies packed close the hero will still march straight through; above it he
  # holds at reach and thins the front line first.
  pushThroughMax: 99
  # Circle-strafe arc (radians) the hero advances around a target he's holding
  # at weapon range — a moving orbit slips enemy fire while his auto-aimed
  # weapon keeps hitting. 0 = the old stand-still hold.
  orbitStep: 0.6
  # EXPLORATION. The hero eagerly discovers new ground before the boss, sweeping
  # his OWN SIDE → the MIDDLE → the boss's side of the map. `exploreReach` is how
  # far (px) he strikes out to uncover the next fog pocket; `exploreBands` splits
  # the spawn→boss axis into that many directional slices and he clears the near
  # ones first (the final, boss-side slice is left for the approach). 1 band = the
  # old undirected nearest-pocket sweep. Discovery is PARTIAL: once `exploreTargetFrac`
  # of the map is uncovered (his side + the middle) he stops fanning out and heads
  # for the boss, leaving the boss's side dark until the approach.
  exploreReach: 900
  exploreBands: 3
  exploreTargetFrac: 0.55
  # ANTI-LOITER. How long (ms) the hero may go without a FIGHT — no live foe
  # inside the ~320px threat ring, no hit taken — before he stops pottering
  # about and MARCHES on the nearest enemy, committing to that foe until it is
  # down or a real fight finds him. Keeps the bot moving toward the action
  # between objectives instead of idling on cleared ground. 0 disables.
  seekFightAfterMs: 5000
  # Engage the boss (and open the elite-hunt pool) this many levels BELOW the
  # boss's level. 1 = commit from one level under parity: sufficiently leveled,
  # sticking around to farm is loitering — the bot rushes the named foes to
  # progress the map (it also flips the balanced posture to its aggro row on
  # that march — see `survive`). 0 = wait for exact parity; negative
  # over-levels first. (Coverage still commits him to the boss if he tops out
  # under the boss's level.)
  bossEngageMargin: 1
  # HAY BALLS (Eastworld): step out of a rolling bale's lane before it shoves the
  # hero back down the street. `hayBallDodgeDist` is how far ahead (px, along the
  # roll) a bale triggers the sidestep; `hayBallLaneMargin` is the slack added to
  # the hero+bale radii when judging whether it shares his lane. 0 dist disables.
  hayBallDodgeDist: 96
  hayBallLaneMargin: 12
  # SAND-STORM avoidance (mars): when a drifting storm's swept corridor is about
  # to catch him, the hero sidesteps perpendicular off its line rather than
  # eating the 2-second knockout. `sandstormClearance` is the lateral berth (px)
  # he leaves past the storm body + his own radius; `sandstormReactSec` is how
  # many seconds of the storm's approach he reacts within (so he ignores a
  # distant gust that may drift wide, then peels once it's genuinely on his line).
  sandstormClearance: 30
  sandstormReactSec: 1.6
  # EMPLOYEE STAMPEDES (SpaceZ HQ): a wall of five staffers charges fast right-to-
  # left and a jump sails clean over the whole herd, so the hero HOPS it rather
  # than eating the ~20% bite + 2-second knockdown. `stampedeDodgeDist` is how far
  # ahead (px, along the charge) the herd's near edge trips the hop — timed so
  # he's airborne when the wall arrives; `stampedeLaneMargin` is the lane slack
  # added to the herd band + his radius. 0 dist disables the dodge.
  stampedeDodgeDist: 64
  stampedeLaneMargin: 10
  # WINDED PACING. At/below this fraction of the max sprint pool the hero drops
  # to the cheap WALK pace (half speed, half drain) — stretching the last sliver
  # and REGAINING the pool on the move (the engine's walk-pace breather).
  # `walkStaminaFrac` is the open-field RESERVE FLOOR at its most TIMID: with
  # no fight in sight the bot spends the pool freely — sprint is cheap ground
  # covered — but never drains past the floor, walking it back up (the
  # `walkResumeFrac` band is the anti-flap hysteresis). The floor SLIDES with
  # BRAVERY (braveryScore in bot.ts): how hard his blows hit the local bars,
  # how fast he's been shredding them the last minute, and the medkits /
  # stamina potions / powerups in his pockets — a naked rookie paces at the
  # timid floor, a kitted shredder dips to `walkBraveFloorFrac`. Arriving at
  # fights RESTED is `topUpSpotDist`'s job: a pack spotted inside that range
  # (beyond the fight ring) is engaged rested — full pool when timid, ~70%
  # when fully brave — via the where-do-we-meet arithmetic: walk the approach
  # when the walk regen still refills before contact, else PLANT and let them
  # cover the ground while the faster standstill regen races their approach
  # (the BREATHER read). A foe inside `walkThreatDist` (px) overrides all
  # pacing: that body can run a walker down, so he keeps the full pace and
  # spends what's left outrunning it. 0 disables each rule respectively.
  walkStaminaFrac: 0.25
  walkBraveFloorFrac: 0.1
  walkResumeFrac: 0.45
  topUpSpotDist: 480
  walkThreatDist: 150
  # KITE BACKWARD. How hard an OVERWHELMED retreat (hp chewed below ~70%, a
  # real pack pressing) drifts BACK along the spawn→boss axis — toward ground
  # already cleared — instead of forward toward the objective (where the fresh
  # spawns live). A fraction of the unit away-from-pack vector (which stays
  # dominant); 0 disables. A HEALTHY hero keeps the classic forward kite
  # (constant backward drift measurably costs the boss on a wave level), and a
  # hero with a NUKE banked keeps it regardless — he can afford to be daring.
  retreatBackBias: 0.6
  # THE WALL-END SENSE. When a travel sweep is blocked, the bot asks the engine
  # "where does this obstacle visibly END?" — looking exactly as far as the
  # SCREEN edge in each direction (the live camera rect the app reports;
  # headless runs use the phone-landscape baseline), so the bot knows what a
  # watching player knows — and walks for the nearer end, latched to one side
  # so a long wall is traced consistently instead of oscillated against. This
  # knob scales that sight: 1 = the full screen, <1 near-sighted, >1
  # clairvoyant; 0 disables the sense (the old local deflection fan alone).
  wallSightFrac: 1
  # KEEP AN ESCAPE ROUTE. The minimum count of OPEN lanes (of the 16-direction
  # escape fan — low enemy pressure, not walled) an OVERWHELMED hero (hp below
  # ~70%, 3+ bodies packed close) demands. Squeezed below it he stops holding
  # and repositions down the best lane left BEFORE the ring closes. 0 disables;
  # a healthy hero skips the caution and a banked nuke waives it.
  escapeLaneMin: 4
  # SPELL THRIFT. Mana regens slowly and every cast pauses the regen for 5s, so
  # a cast that converts poorly is mana thrown away. A damage cast (bolt / nova
  # / rain) must convert to at least `spellEffMin` EFFECTIVE damage per point of
  # mana — measured in the catalog's level-1 damage units and OVERKILL-CAPPED
  # (damage past a foe's remaining bar counts nothing) — before the bot spends
  # the pool on it. A lone-target bolt clears ~2.3–3.3; an AoE on one body only
  # ~1.7 — so at 2 the bolt flies at a single foe while the nova waits for a
  # real crowd. While the pool BRIMS (at/above `spellBrimFrac` of max) the
  # regen is being wasted anyway, so the floor relaxes to `spellEffBrimMin` and
  # idle mana converts to damage at a poorer (but nonzero) rate.
  spellEffMin: 2
  spellEffBrimMin: 1
  spellBrimFrac: 0.85
  # What a KILL is at least worth to that efficiency read (same level-1 damage
  # units; never more than the cast's own damage). The overkill cap alone
  # starves the horde clear: against a pack the hero outlevels, every bar reads
  # near zero and a nova one-shotting five bodies scores as "waste" — when
  # erasing five attackers with one cast is exactly the play. At 12, a nova
  # that kills 3+ trash bodies clears the floor; a bolt spent on one trash mob
  # the weapon would fell anyway still reads as waste and is held.
  spellKillCredit: 12

# Per-level overrides. Add a block under a level id to bend a knob for that map.
levels:
  # SpaceZ HQ opens DISARMED: a scripted vanguard scientist must rush the hero
  # to draw his blade, but it only breaks from the pack once the hero is within
  # ~200px of a scientist (the `spacez_staff` first-sight beat). Hold at the
  # pack's edge — inside that trigger range, outside the swarm — so the beat
  # fires and the rusher comes to him instead of the hero diving in unarmed.
  spacez_hq:
    armApproachStandoff: 150
