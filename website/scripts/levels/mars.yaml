description: |-
  LEVEL 3 - MARS. SpaceZ wrote the moon off and moved the whole operation here.
  Open red desert on the west - rovers working dust already full of tire tracks -
  hardens into the colony base on the east (a tile zones split at the dome wall):
  deck plating, servo robots, the fembot line, and the billionaires who bought the
  lifeboat. ELON MOSQUE holds court at the far end; he doesn't die - he flees into
  a rift, and the rift stays. Two airlock gaps funnel the horde; the TERRARIUM
  sits locked in the SE corner behind a keycard.
campaign: true
id: mars
index: 3
name: MARS
prelude:
  - moon_depart
  - voyage_mars
music: red_dust
intro:
  - - HE SAID THE MOON WAS SPACEZ'S BIG
    - MISTAKE - THE COMPANY PACKED IT
    - ALL INTO CRATES AND RAN. TO MARS.
  - - I KNOW WHAT A SPACEZ COLONY LOOKS
    - LIKE - I REBUILT THEIR LANDER ONCE.
    - DOMES. ROBOTS. SECRETS.
  - - SOMEBODY DOWN HERE TRADED MY
    - GIRL AWAY LIKE CARGO.
    - BAD TRADE. FOR THEM.
