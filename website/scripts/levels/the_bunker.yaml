description: |
  THE BUNKER - the secret cow level (SECRET, off-campaign). The only way in is a
  ritual nothing explains: kill RASPUTIN in the rift, notice the SEVERED HAND he
  drops, USE it, step through the blast door it tears open. Inside: the
  billionaires' continuity-of-wealth vault, six marble suites on one narrow
  corridor spine, each resident ringed by bodyguards while the privatized security
  state floods the halls. NO boss - the exit door at the far end is the objective,
  the world-drop table is the whole game's relic list at sweetened odds. The exit
  leads back to the rift.
secret: true
id: the_bunker
index: 5
name: THE BUNKER
music: hq_lockdown
intro:
  - - THE HAND FIT THE DOOR.
    - THE DOOR FIT NOWHERE.
    - IT OPENED ANYWAY.
  - - MARBLE FLOORS. GOLD TAPS. CANNED
    - CAVIAR TO THE CEILING. SOMEBODY
    - BUILT A FIVE-STAR APOCALYPSE HERE.
  - - I KNOW THESE FACES. EVERY MAGAZINE
    - COVER FROM THE YEARS JOBS DRIED UP.
    - SO THIS IS WHERE THEY WENT.
  - - THEY TOOK THE SPIES, THE ARMY, ICE,
    - AND THE VACUUM CLEANERS. EVERYONE
    - ELSE GOT THE WELFARE LINE.
  - - FINE. THEY HOARDED THE BEST GEAR
    - IN ANY UNIVERSE. TIME FOR SOME
    - REDISTRIBUTION.
outro:
  - - THE EXIT SPAT ME BACK INTO THE
    - RIFT. THE DOOR SEALED ITSELF,
    - AND THE SEAM... WANDERED OFF.
  - - THE LEDGERS ALL READ ZERO. THEY
    - DIDN'T BUY A BUNKER - THE MACHINE
    - TOOK THEIR MONEY AND LOCKED THEM IN.
  - - WHERE WAS THAT PLACE? NO WINDOWS.
    - NO STARS. EARTH GRAVITY, MOON
    - SILENCE, MARBLE FROM NO QUARRY.
  - - UNDER NEVADA? UNDER ZURICH? UNDER
    - THE MOON? OR JUST A CELLAR BOLTED
    - TO THE BACK OF THE UNIVERSE?
  - - NO ADDRESS. NO NATION. NO
    - EXTRADITION. THE RICHEST ROOM THAT
    - EVER EXISTED ISN'T ANYWHERE AT ALL.
  - - "I'LL FIND IT AGAIN THE SAME WAY:"
    - A COLD HAND, AND A DOOR THAT
    - SHOULDN'T ANSWER.
