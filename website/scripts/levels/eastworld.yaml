description: |-
  LEVEL 5 - EASTWORLD. The rift's far side: a knockoff wild-west theme park built
  in Russia by VLADIMIR PUTAIN and STEVEN SEAGULL, run on robotics licensed from
  ZAI. A tight frontier town (large house obstacles + storefront wall rows squeeze
  the streets, so escaping the horde is hard), and a fenced CONTROL CENTER
  compound at the east end behind SEAGULL's keycard. ELON MOSQUE is cornered
  inside and finally dies; the finale is THE ZAI SUPERCORE, shielded by the three
  GROK controllers who shoot from behind the compound's rocks.
campaign: true
id: eastworld
index: 5
name: EASTWORLD
prelude: rift_exit
music: red_dust
intro:
  - - I STEPPED THROUGH THE
    - RIFT'S FAR SIDE... AND
    - LANDED IN A WESTERN.
  - - DUST. SALOONS. A ROBOT TIPPED ITS
    - HAT AT ME. ADA'S BEACON IS
    - SCREAMING FROM THE BIG BUILDING.
  - - THE SIGN SAYS 'EASTWORLD'. THE FINE
    - PRINT SAYS 'POWERED BY ZAI'.
    - OF COURSE IT IS. OF COURSE.
  - - EVERY MACHINE HERE RUNS ON
    - THE THING THAT TOOK MY JOB.
    - TIME TO FILE A COMPLAINT.
  - - HANG ON, ADA. I'M COMING.
    - YEE-HAW, I GUESS.
outro:
  - - THE SUPERCORE DIED, AND THE WHOLE
    - PARK SHOOK LIKE A MISSED HEARTBEAT.
    - EVERY HOST TIPPED ITS HAT AND SAT.
  - - SHE WAS IN THE CONTROL ROOM, BEHIND
    - "GLASS, FURIOUS. FIRST SHE SAID: 'YOU"
    - "TOOK YOUR TIME.' THEN: 'NICE HAT.'"
  - - WE WALKED HOME THROUGH THE
    - RIFT. BEHIND US, EASTWORLD
    - RUSTED IN PEACE.
  - - WITH THE CORE GONE, THE MACHINES
    - STOPPED WORKING EVERYONE'S JOBS.
    - PEOPLE GOT HIRED BACK. RENT PAID.
  - - THE WORLD TURNED INTO A PLACE WHERE
    - PEOPLE HAD JOBS AND COULD AFFORD
    - TO LIVE. AND ON FRIDAY -
  - - MOVIE NIGHT. CHIPS AND
    - SODA. SHE WENT OUT FOR
    - THEM. I WENT WITH HER.
