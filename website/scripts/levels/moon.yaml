description: |-
  LEVEL 2 - THE MOON. Ada's beacon dies near the old flag: ghosts thicken with
  distance from the landing site, and ARMSTRONG haunts the far side. Low gravity
  (floaty hops), open regolith with craters to jump and slabs to break line of
  sight.
campaign: true
id: moon
index: 2
name: THE MOON
prelude:
  - launch
  - voyage_moon
music: regolith_ride
intro:
  - - ADA'S TRACKER WENT QUIET
    - SOMEWHERE NEAR THE OLD APOLLO
    - FLAG. THAT'S WHERE I'M HEADED.
  - - AND SOMETHING IS MOVING OUT
    - THERE IN THE DUST. THIS PLACE
    - IS SUPPOSED TO BE EMPTY.
  - - I KNOW THIS LANDING SITE FROM THE
    - OLD MISSION CHARTS. EVERY CRATER.
    - THE FASTEST LINE RUNS TO THAT FLAG.
  - - KEEP MOVING. I'M COMING, ADA.
width: 2400
height: 1600
gravity: 340
