description: |-
  LEVEL 2 - THE MOON. Ada's beacon dies near the old Apollo flag; ARMSTRONG
  haunts the far side and the ghosts thicken with every step from the lander.
  THE READ: an open lunar plain, but the regolith is broken into FOUR BASINS by
  three long rock RIDGES with OFFSET gaps that ALTERNATE low, high, low - so the
  climb from the lander to the flag is a full SERPENTINE SWEEP, down through the
  opening basin, UP the whole height of the second, back DOWN the third, then UP
  the last to the flag. The hero walks most of the moon, not one straight
  diagonal - it still feels like open floaty moon, just no longer a half-empty
  field. Low-gravity hops, craters to jump, slabs to break line of sight.
  TWO OFF-PATH DETOURS sit right on the sweep's low turns, each a short dip into
  a walled pocket for a cache - the "explore for loot" lesson. The CRASHED
  LANDER is a walled wreck under the opening basin where the LOST COSMONAUT
  drifts a supply cache; THE THIRTEENTH GRAVE is a deep walled crater at the
  bottom of the boss basin where THE THIRTEENTH MAN keeps his own. Each is a
  quiet cul-de-sac (no ambient horde) holding a chest and its lone guardian.
  TEMPO: a gentle opening while the player learns the floaty steering, a swell
  through the mid basins, a breather at the STILL POINT by the flag where the
  salvage merchant trades, then a final surge as ARMSTRONG wakes.
campaign: true
id: moon
index: 2
name: THE MOON
prelude:
  - launch
  - voyage_moon
music: regolith_ride
intro:
  - - ADA'S TRACKER WENT QUIET
    - SOMEWHERE NEAR THE OLD APOLLO
    - FLAG. THAT'S WHERE I'M HEADED.
  - - AND SOMETHING IS MOVING OUT
    - THERE IN THE DUST. THIS PLACE
    - IS SUPPOSED TO BE EMPTY.
  - - I KNOW THIS LANDING SITE FROM THE
    - OLD MISSION CHARTS. EVERY CRATER.
    - THE FASTEST LINE RUNS TO THAT FLAG.
  - - KEEP MOVING. I'M COMING, ADA.
