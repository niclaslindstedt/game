objective:
  type: killBoss
# THE INTENDED PATH: the SERPENTINE SWEEP through the alternating ridge gaps
# from the lander to ARMSTRONG. The autopilot follows it (so it rounds the
# ridges instead of wedging) and the app points its "go this way" arrow along
# it. Each leg threads the next basin's offset gap: LOW out of the lander (past
# the CRASHED LANDER dip), UP the full height of basin two, back DOWN through
# basin three, then UP the boss basin (past THE THIRTEENTH GRAVE dip) to the
# STILL POINT and the flag.
path:
  - x: 340
    y: 1320
  - x: 520
    y: 1360
  - x: 700
    y: 1300
  - x: 880
    y: 1140
  - x: 1020
    y: 720
  - x: 1180
    y: 420
  - x: 1340
    y: 520
  - x: 1520
    y: 960
  - x: 1690
    y: 1300
  - x: 1880
    y: 1260
  - x: 1900
    y: 600
  - x: 2130
    y: 260
rareSpawns:
  rare:
    - moonstruck_mourner
    - lost_cosmonaut
  unique:
    - the_thirteenth_man
# HARD-CODED per-difficulty mob levels [easy, medium, hard, nightmare]; JESUS
# stays player-relative. This is the LEVEL DEFAULT (the pinned scatter + rare
# spawns read it); the ridge-gap spawn points below RAMP their own levels up as
# the hero climbs toward the flag (see each `mobLevels`).
mobLevels: [[7, 13], [7, 14], [10, 17], [45, 48]]
# INTENDED hero level per difficulty [easy, medium, hard, nightmare] — the
# design-intent anchor the map-layout tool colours spawner CON against.
intendedLevel: [7, 7, 10, 46]
spawns:
  # The four speaking elites, pinned along the sweep so the conspiracy unspools
  # in order — the grave under the dust, the corporate claim, the quarantine,
  # and Ada's trail — each guarding the basin its keycard/loot belongs to.
  # Levels ramp with the basin; HP scales up the campaign ladder.
  - enemy: apollo_ghost
    at:
      x: 880
      y: 1120
    level: [13, 14, 17, 48]
    hp: [220, 330, 506, 1320]
  - enemy: prospector
    at:
      x: 1040
      y: 720
    level: [13, 14, 17, 48]
    hp: [240, 360, 552, 1440]
  - enemy: quarantine_medic
    at:
      x: 1340
      y: 500
    level: [13, 14, 17, 48]
    hp: [260, 390, 598, 1560]
  - enemy: cartographer
    at:
      x: 1560
      y: 940
    level: [13, 14, 17, 48]
    hp: [240, 360, 552, 1440]
  # The two detour guardians, PINNED (not just random rares) inside each pocket
  # off the sweep's low turns — the whole reward for exploring a dead end.
  - enemy: lost_cosmonaut
    at:
      x: 500
      y: 1470
    level: [10, 11, 14, 45]
    hp: [170, 250, 380, 1020]
  - enemy: the_thirteenth_man
    at:
      x: 1980
      y: 1440
    level: [14, 15, 18, 48]
    hp: [320, 480, 736, 1920]
  - enemy: armstrong
    at:
      x: 2130
      y: 260
    level: [15, 16, 19, 49]
    hp: [550, 825, 1265, 3300]
safeZones:
  # THE STILL POINT: a calm nook on the last climb to the flag, so the horde is
  # repelled off the boss approach and the hero (and the autopilot) walks in
  # clean. A breather + the salvage merchant before ARMSTRONG (who haunts the
  # flag ~410px north-east, well outside the zone).
  - shape: circle
    pos:
      x: 1900
      y: 600
    radius: 175
    label: STILL POINT
quietZones:
  # The two detour pockets are dead cul-de-sacs — no ambient horde spawns
  # inside, so poking in for the chest and its lone guardian stays calm. Each
  # rect hugs the pocket walls, entrance (the top) left open.
  - shape: rect
    rect:
      x: 380
      y: 1410
      width: 280
      height: 180
    label: CRASHED LANDER
  - shape: rect
    rect:
      x: 1800
      y: 1350
      width: 360
      height: 210
    label: THE THIRTEENTH GRAVE
chests:
  # The two off-path caches — the payoff for the detour. Each sits deep in its
  # pocket, off the walls, so its chrome reads against the dust.
  - at:
      x: 520
      y: 1500
  - at:
      x: 1980
      y: 1480
tempo:
  # Build-and-release over the serpentine: a gentle floaty-steering opener, a
  # swell through the mid basins, a breather at the STILL POINT / shop beat,
  # then a surge for ARMSTRONG.
  - at: 0
    intensity: 0.5
  - at: 0.16
    intensity: 0.85
  - at: 0.42
    intensity: 1.15
  - at: 0.66
    intensity: 1
  - at: 0.84
    intensity: 0.68
  - at: 1
    intensity: 1.4
merchantSpawns:
  # Primary: the STILL POINT nook before the flag. Secondary: the mid basin by
  # the prospector, so the trader sometimes greets the hero mid-climb.
  - x: 1900
    y: 640
  - x: 1040
    y: 760
spawners:
  # THE HORDE AS FINITE SPAWN POINTS (not a bottomless wave): one knot per LEG of
  # the serpentine, each arming as the hero sweeps into it (wide `triggerRadius`
  # so a cut corner still trips it) and DRAINING its count — the mobs give chase,
  # so he clears them ON THE MOVE, then walks on to an empty patch. Counts sum to
  # ~1140 across the sweep (a fuller "clear the whole moon" battle), back-loaded
  # so the opener stays the gentle onboarding knot and the basins swell toward
  # the flag. The mob TYPE ramps basin to basin (wisps → ghosts → wraiths →
  # OPTIMUSK) and the per-point `mobLevels` climb with it. Easy's active-spawner
  # cap (2) means only the two nearest knots light at once, so the longer sweep
  # spreads the fight across the whole moon instead of stacking it on the
  # diagonal. The per-map XP cap (not the head-count) bounds how far a clear
  # levels the hero.
  # --- Opening basin, low out of the lander. ---
  - id: open
    at: { x: 500, y: 1280 }
    maxAlive: 15
    mobLevels: [[7, 8], [7, 8], [10, 11], [45, 46]]
    triggerRadius: 560
    lingering: 12
    members:
      - enemy: wisp
        count: 110
  # --- Low turn into basin two, past the first ridge gap. ---
  - id: low
    at: { x: 900, y: 1120 }
    maxAlive: 16
    mobLevels: [[8, 9], [8, 9], [11, 12], [45, 46]]
    triggerRadius: 520
    lingering: 10
    members:
      - enemy: wisp
        count: 110
      - enemy: ghost
        count: 60
  # --- The full climb UP basin two toward the high gap. ---
  - id: climb
    at: { x: 1040, y: 720 }
    maxAlive: 16
    mobLevels: [[9, 10], [9, 11], [12, 14], [46, 47]]
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: wisp
        count: 70
      - enemy: ghost
        count: 90
      - enemy: wraith
        count: 40
  # --- Top of basin three, entering high from the ridge-B gap. ---
  - id: top
    at: { x: 1360, y: 520 }
    maxAlive: 16
    mobLevels: [[10, 11], [10, 12], [13, 15], [46, 47]]
    triggerRadius: 500
    lingering: 8
    members:
      - enemy: ghost
        count: 90
      - enemy: wraith
        count: 70
      - enemy: optimusk
        count: 20
  # --- The descent DOWN basin three toward the low ridge-C gap. ---
  - id: desc
    at: { x: 1540, y: 980 }
    maxAlive: 16
    mobLevels: [[10, 11], [10, 12], [13, 15], [46, 47]]
    triggerRadius: 500
    lingering: 8
    members:
      - enemy: ghost
        count: 70
      - enemy: wraith
        count: 80
      - enemy: optimusk
        count: 30
  # --- Low turn into the boss basin, past THE THIRTEENTH GRAVE. ---
  - id: low4
    at: { x: 1860, y: 1180 }
    maxAlive: 16
    mobLevels: [[11, 12], [11, 13], [14, 16], [47, 48]]
    triggerRadius: 480
    lingering: 8
    members:
      - enemy: wraith
        count: 60
      - enemy: ghost
        count: 50
      - enemy: optimusk
        count: 30
  # --- The boss basin's upper climb: a last surge as ARMSTRONG stirs. ---
  - id: bay
    at: { x: 2080, y: 440 }
    maxAlive: 15
    mobLevels: [[11, 12], [11, 13], [14, 17], [47, 48]]
    triggerRadius: 360
    lingering: 6
    members:
      - enemy: wraith
        count: 70
      - enemy: optimusk
        count: 50
      - enemy: ghost
        count: 40
walls:
  # === ROCK RIDGES: three long rubble spines that break the plain into FOUR
  # basins, each leaving ONE wide OFFSET pass-gap that ALTERNATES low, high, low
  # — so the sweep threads LOW, climbs to round the HIGH gap, drops back through
  # the LOW gap, then climbs the boss basin. Wide gaps on purpose — a pressured
  # hero (and the autopilot) rounds them without pixel-perfect lining-up. ===
  # --- Ridge A (x=680), gap LOW (y 1040-1600 open): the hero stays low out of
  # the lander and rounds the spine's bottom. ---
  - kind: boulder
    from:
      x: 680
      y: 200
    to:
      x: 680
      y: 1040
    radius: 13
    jumpable: false
  # --- Ridge B (x=1180), gap HIGH (y 200-640 open): the hero climbs the full
  # height of basin two to round it. ---
  - kind: boulder
    from:
      x: 1180
      y: 640
    to:
      x: 1180
      y: 1600
    radius: 13
    jumpable: false
  # --- Ridge C (x=1680), gap LOW (y 1000-1600 open): the hero drops back down
  # through basin three into the boss basin. ---
  - kind: boulder
    from:
      x: 1680
      y: 200
    to:
      x: 1680
      y: 1000
    radius: 13
    jumpable: false
  # === CRASHED LANDER detour (a dip below the opening basin) — the LOST
  # COSMONAUT drifts a supply cache in this walled wreck; entrance is the top
  # gap the sweep passes over. ===
  - kind: boulder
    from:
      x: 400
      y: 1420
    to:
      x: 400
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 640
      y: 1420
    to:
      x: 640
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 400
      y: 1592
    to:
      x: 640
      y: 1592
    radius: 13
    jumpable: false
  # === THE THIRTEENTH GRAVE detour (a dip at the bottom of the boss basin) — a
  # deep walled crater the THIRTEENTH MAN keeps; entrance is the top gap the
  # sweep passes over on its way up to the flag. ===
  - kind: boulder
    from:
      x: 1820
      y: 1380
    to:
      x: 1820
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 2140
      y: 1380
    to:
      x: 2140
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 1820
      y: 1592
    to:
      x: 2140
      y: 1592
    radius: 13
    jumpable: false
