# The ambient horde is authored as SPAWN POINTS (see `spawners` below), not a
# banded scatter or a continuous wave — so `spawns` holds only the PINNED set
# pieces: the five speaking elites, the unique locker guardian, and the boss.
spawns:
  # The five speaking elites are strung along the aisles so the serpentine walks
  # the player past each in turn (and their keycards open the corner vaults).
  # NIGHT MANAGER sits behind aisle 1's solid upper run — out of the opening
  # strike, met on the first up-sweep.
  # Each pinned set piece hard-codes its per-difficulty LEVEL (loot tier +
  # contact) and BASE HP (the live power-match multiplies it on top). Levels ramp
  # with the aisle the elite guards; HP scales up the ladder.
  - enemy: night_manager
    at:
      x: 560
      y: 370
    ramp: bold
    hp: 150
  - enemy: security_chief
    at:
      x: 900
      y: 600
    ramp: fierce
    hp: 210
  - enemy: janitor
    at:
      x: 960
      y: 880
    ramp: fierce
    hp: 230
  - enemy: head_scientist
    at:
      x: 1200
      y: 600
    ramp: savage
    hp: 190
  - enemy: architect
    at:
      x: 1480
      y: 400
    ramp: savage
    hp: 190
  # The level's UNIQUE, pinned as the guardian of the BREAK ROOM detour locker.
  - enemy: employee_of_the_month
    at:
      x: 910
      y: 150
    ramp: fierce
    hp: 180
  - enemy: muskrat
    at:
      x: 1850
      y: 590
    ramp: merciless
    hp: 480
safeZones:
  # The calm strip in the boss-room MOUTH: centred ON the last aisle's gap so the
  # horde is repelled out of the entrance itself, not just the room beyond — the
  # player (and the autopilot) walks IN clean instead of grinding through a wave
  # bottlenecked at the chokepoint. A breather + the vending-machine merchant
  # before MUSKRAT (who sits ~240px east, outside the zone).
  - shape: circle
    pos:
      x: 1610
      y: 600
    radius: 175
    label: PIT STOP
quietZones:
  # The two off-path detours and the three keycard vaults are dead pockets - no
  # ambient horde spawns inside, so poking into a cul-de-sac for its locker or
  # story pickup stays calm. Each rect hugs the pocket's walls (entrance left open).
