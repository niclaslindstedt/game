      - I STOCK THE VENDING MACHINES.
      - SOMEBODY HAS TO, EVEN TONIGHT.
    - - LOCKDOWN IS A SELLER'S MARKET.
      - I'LL BUY WHAT WEIGHS YOU DOWN,
      - SELL WHAT KEEPS YOU UPRIGHT.
  returnGreeting:
    - BACK ALREADY, FRIEND?
    - THE MACHINES MISSED YOU.
