merchantSpawns:
  # Primary: the PIT STOP safe nook before the boss. Secondary: the early
  # aisle by the ada_soda pickup, so the shop sometimes greets the player
  # mid-floor instead.
  - x: 1680
    y: 600
  - x: 600
    y: 450
spawners:
  # THE HORDE AS SPAWN POINTS (not an endless wave): one big point per aisle
  # sweep, each arming as the hero advances into it (wide `triggerRadius` so a
  # cut corner still trips it) and DRAINING its mob count — the emitted mobs give
  # chase, so he fights and clears them ON THE MOVE, then the patch is empty and
  # he walks on. The counts are sized so clearing the sweep levels him enough to
  # finish MUSKRAT (a finite total, not a bottomless wave). `maxAlive` is a
  # generous 20 (up from 15) so a player who WANTS to fight has a thick enough
  # crowd on screen to level on — the onboarding floor should reward engaging the
  # horde with real levels before the boss, not throttle the fight down to a
  # trickle. Each aisle also chains a lighter follow-up (`after`) that only arms
  # if he lingers — a bonus for the completionist, never a bog for the runner. The
  # mob TYPE ramps aisle to aisle (interns → scientists → engineers/guards →
  # hazmat/OPTIMUSK).
  # --- Opening: a light knot of interns the level-1 hero can actually clear to
  # find his feet — deliberately small so the opener LEVELS him instead of
  # pinning him against the first shelf. ---
  # Counts sum to ~900 across the sweep (an 800–1200 "clear the whole floor"
  # battle), back-loaded so the opener stays the gentle onboarding knot and the
  # aisles swell toward the boss. The per-map XP cap (not the head-count) bounds
  # how far a clear levels the hero, so a big fight never over-levels him.
  - id: open
    at: { x: 400, y: 680 }
    maxAlive: 20
    # Easy opens at level 1 (gentle onboarding); medium/hard bite harder from the
    # first knot (higher-level interns), so standing still is never free on the
    # intended fight and up.
    ramp: vanguard
    triggerRadius: 540
    lingering: 12
    members:
      - enemy: intern
        count: 100
  # --- Aisle 1 (the first down-sweep). ---
  - id: a1
    at: { x: 560, y: 900 }
    maxAlive: 20
    ramp: meek
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: intern
        count: 70
      - enemy: scientist
        count: 50
  - after: a1
    at: { x: 600, y: 400 }
    maxAlive: 20
    ramp: meek
    members:
      - enemy: scientist
        count: 50
  # --- Aisle 2 (down-sweep). ---
  - id: a2
    at: { x: 900, y: 460 }
    maxAlive: 20
    ramp: bold
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: scientist
        count: 80
      - enemy: engineer
        count: 50
  - after: a2
    at: { x: 950, y: 860 }
    maxAlive: 20
    ramp: bold
    members:
      - enemy: engineer
        count: 40
      - enemy: guard
        count: 30
  # --- Aisle 3 (up-sweep). ---
  - id: a3
    at: { x: 1180, y: 720 }
    maxAlive: 20
    ramp: fierce
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: engineer
        count: 70
      - enemy: guard
        count: 70
  - after: a3
    at: { x: 1200, y: 340 }
    maxAlive: 20
    ramp: fierce
    members:
      - enemy: guard
        count: 40
      - enemy: hazmat
        count: 30
  # --- Aisle 4 (up-sweep toward the boss mouth). ---
  - id: a4
    at: { x: 1450, y: 400 }
    maxAlive: 20
    ramp: savage
    triggerRadius: 500
    lingering: 8
    members:
      - enemy: guard
        count: 60
      - enemy: hazmat
        count: 50
      - enemy: optimusk
        count: 40
  # --- The boss bay: a last surge of OPTIMUSK units as MUSKRAT wakes. ---
  - at: { x: 1780, y: 600 }
    triggerRadius: 320
    lingering: 6
    members:
      - enemy: optimusk
        count: 45
      - enemy: hazmat
        count: 35
walls:
  # === GROCERY-STORE SHELF AISLES ===
  # Five full-height shelf walls, each with ONE wide (~440px) pass-gap that
  # ALTERNATES between a LOW band and a HIGH band, so crossing the floor sweeps
  # the hero DOWN then UP then down then up, aisle by aisle, before the mid mouth
  # into MUSKRAT's bay. The gaps are deliberately WIDE — a pressured hero (and the
  # autopilot) can thread them without pixel-perfect lining-up — and the swing is
  # kept to ~370px centre-to-centre so the weave reads without being a marathon
  # climb. The authored `path` threads the gap centres so the autopilot (and the
  # guidance arrow) follow the intended weave instead of cutting the centre.
