description: |-
  LEVEL 1 - SPACEZ HQ. Ada's trail points off-planet and our hero builds
  spaceships for a living - but his garage ship's engine needs the one part
  SpaceZ keeps in its cleanroom, and the night shift is not letting it leave the
  building. The sales floor is laid out like a grocery store: a serpentine of
  solid SHELF AISLES with alternating end-gaps herds the player up and down the
  whole floor left-to-right, so clearing the level means walking almost every
  square of it. MUSKRAT, the mutant rat who ate the part, nests under the
  prototype rocket in the bay past the last aisle.
  THE ONBOARDING FEEL: a gentle start that eases the player into steering and the
  loot loop (an opening-strike beat draws the weapon, early drops reward the first
  kills), then a build-and-release arc - the horde swells through the aisles,
  eases into a calm strip by the prototype where the vending-machine merchant
  waits so the player can shop, then surges for MUSKRAT.
  TWO OFF-PATH DETOURS reward the player who pokes into a dead-end - the "explore
  for loot" lesson: the STOCK ROOM, a walled cul-de-sac off the last aisle
  holding a SpaceZ locker, and the BREAK ROOM, a pocket off an early aisle where
  the EMPLOYEE OF THE MONTH guards a locker of his own. Three keycard-locked
  corner vaults (starter stash, core lab, cleanroom) stay as gated story pockets
  the elites' keycards open.
campaign: true
id: spacez_hq
index: 1
name: SPACEZ HQ
prelude: prelude
music: hq_lockdown
intro:
  - - ADA WENT OUT FOR CHIPS AND
    - SODA TWO HOURS AGO.
    - SHE NEVER CAME BACK.
  - - THE TRACKER I SEWED INTO HER JACKET
    - JUST PINGED - FROM SPACE. SOMEONE
    - IS TAKING HER OFF THE PLANET.
  - - TO FOLLOW HER I NEED A SHIP. I'VE
    - BEEN BUILDING ONE IN THE GARAGE
    - FOR YEARS. IT'S ALMOST DONE.
  - - ALMOST. THE ENGINE STILL NEEDS ONE
    - PART I COULD NEVER GET. SPACEZ
    - KEEPS IT IN THEIR CLEANROOM VAULT.
  - - I KNOW, BECAUSE I WORKED THERE. I
    - BUILT THEIR ENGINES - TILL AN AI
    - LEARNED MY JOB AND THEY FIRED ME.
  - - THE WHOLE BLOCK LOST ITS JOBS
    - THE SAME WAY. NOW WE ALL LIVE
    - ON WELFARE AND MOVIE NIGHTS.
  - - THEY NEVER CHANGED THE LOCKS.
    - EVERY DOOR STILL KNOWS MY HAND.
  - - SO TONIGHT I TAKE THE PART,
    - FINISH THE SHIP, AND GO GET
    - ADA BACK.
