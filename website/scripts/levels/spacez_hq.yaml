# THE INTENDED PATH: the route through the shelf-aisle gaps from spawn to
# MUSKRAT. The autopilot follows it (so it rounds the walls instead of wedging),
# and the app points its "go this way" arrow along it. Each leg threads the next
# aisle's pass-gap, ending at the PIT STOP and the boss.
