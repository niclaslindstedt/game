description: |
  LEVEL 4 - THE RIFT. MOSQUE tore a hole in the world on Mars and ran; the hero
  walks in after him. A hallucinatory space between universes: no ground (the void
  tiles ARE the floor), gravity turned soft, black holes strewn across the road,
  asteroids streaking through, and history's missing wandering the noise. GROK
  OMEGA guards the deep end and spills the reveal; MOSQUE flees a second time at
  the far door. A travel gate to the secret bunker opens here.
campaign: true
id: the_rift
index: 4
name: THE RIFT
prelude: rift_entry
music: rift_drift
intro:
  - - THERE'S NO FLOOR IN HERE.
    - NO SKY. NO NORTH. MY BOOTS
    - GRIP SOMETHING ANYWAY.
  - - "THE MARS TABLET SAID IT PLAIN:"
    - ADA IS THE TRIBUTE, HANDED OVER
    - IN HERE. SHE CAME THROUGH THIS PLACE.
  - - HER BEACON PINGS FROM
    - EVERYWHERE AT ONCE. EVEN THE
    - SIGNAL IS HALLUCINATING.
  - - FIND THE FAR SIDE. CATCH
    - THE COWARD. BRING HER HOME.
width: 3000
height: 1600
gravity: 200
biome: rift
