name: hero_0
family: hero
size: [16, 16]
description: >
  The hero out of his spacesuit: a front-facing everyman in a white t-shirt,
  blue jeans, and brown shoes, with a mop of dark brown hair and a pale face,
  standing in a neutral idle stance. This is the plain-clothes paper-doll base
  the worn-armor and held-weapon layers composite onto before he suits up — the
  laid-off SpaceZ spaceship builder on his living-room movie night. 16x16 flat
  16-bit pixel art.
