name: player_1
family: hero
size: [16, 16]
description: >
  The hero suited up in a plain, working EVA pressure suit — recovered gear, not
  a sleek hero suit: a short, stocky, top-heavy astronaut doll seen front-on. The
  silhouette reads at a glance as a big rounded white-and-light-grey helmet dome
  capping the figure, crossed by one horizontal gold visor band whose lower edge
  glows amber, over a compact bulky torso and stubby grey boots. On the otherwise
  white-and-grey suit only two accents carry at tiny size: that gold visor and a
  single small red indicator light on the chest. Arms hang plain at the sides,
  gloved hands empty and held low — this is the suited paper-doll BASE the
  worn-armor and held-weapon layers composite onto, so it must stay clean and
  layer-friendly. This is the walk-stride frame: his two legs are planted wide
  apart, boots spread to the outer edges mid-step. Lit from the top-left. 16x16
  flat 16-bit pixel art.
