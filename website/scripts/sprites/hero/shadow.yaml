description: >
  The soft blob shadow drawn on the ground beneath characters: a small, flat
  oval of semi-transparent dark blue-grey, wider than it is tall, with softly
  rounded ends and no detail. Grounds a sprite to the floor and lifts away from
  it as the character jumps. A 12x4 flat pixel-art shadow.
