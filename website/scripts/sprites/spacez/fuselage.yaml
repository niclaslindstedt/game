name: fuselage
family: spacez
size: [20, 26]
description: >
  A half-built spaceship standing in its assembly jig — a white SpaceZ hull with
  a red nose cone, a porthole, and exposed structural ribs at the unfinished
  base, cradled in a slate scaffold. A solid, un-hoppable obstacle.
subject:
