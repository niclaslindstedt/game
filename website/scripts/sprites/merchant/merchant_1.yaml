name: merchant_1
family: merchant
size: [16, 16]
description: >
  A front-facing figure swathed in a deep-purple hooded cloak, two glowing
  amber eyes the only feature under the hood, a small tan leather coin-satchel
  slung at the hip. A mysterious between-worlds rift trader who buys scrap and
  sells gear; this is a mid-bob idle frame, near-identical to the rest of the
  cycle but with the feet planted a touch wider.
