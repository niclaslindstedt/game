name: sandstorm_1
family: mars
size: [24, 24]
description: >
  One churn-frame of a small Martian dust squall — a rolling, roughly
  oval gust of rusty regolith with dark grit swirling through it and
  wispy translucent edges. Frame 1 of a four-frame rotation.
subject:
  kind: hazard prop
  build: a small, roughly oval churning dust cloud, wider than tall
  features: curved streaks of dark grit spiralling through rusty dust, a pale catch-light upper-left, ragged translucent edges
  pose: swirl streaks rotated a quarter turn, grit massing lower-left
  flavor: a sand gust rolling across the red desert — get clear or be knocked flat
palette:
  d: "#7a4228" # dark grit swirl
  t: "#b2643e" # rusty-orange dust body
  u: "#cf9068" # light dust
  h: "#e8c49a" # pale catch-light fleck
  w: "#c38668b0" # translucent mid wisp
  W: "#c3866860" # faint outer wisp
