description: >
  UNIT ZERO: a boxy humanoid staff droid cast in tarnished antique brass
  and gold, front-facing, with a gold crest on its head, a single lit
  yellow eye in a visored face, two stubby arms, and a grey treaded base
  instead of legs. Old firmware, older grudge. This idle frame catches
  the treaded base shifted one step to the side, mid-roll.
