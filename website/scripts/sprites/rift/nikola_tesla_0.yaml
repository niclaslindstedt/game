description: >
  NIKOLA TESLA, the vanished inventor: a lean man in a dark Victorian
  frock-suit, pale face with slicked hair and small goggles, crackling arcs
  of cyan-white electricity leaping from both raised hands. Reads at a glance
  as an electric wizard in period dress.
