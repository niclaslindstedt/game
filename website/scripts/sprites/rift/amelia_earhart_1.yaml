description: >
  A front-facing figure in a brown leather flight jacket over dark trousers,
  short tousled hair and a pale scarf, brandishing a thin light blade out to one
  side; caught mid-stride with the feet staggered, one leg forward and the other
  trailing. Reads as a 1930s aviator (AMELIA EARHART) who never stopped flying.
