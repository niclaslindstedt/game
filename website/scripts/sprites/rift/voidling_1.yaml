name: voidling_1
family: rift
size: [16, 16]
description: >
  A small, ragged blob of hungry void-black rimmed in deep indigo, its lumpy
  formless body studded with several pale-cyan pinprick eyes and glints. Here the
  eyes are shifted, some blinking, as it writhes. Reads as the rift's lowest
  fodder, a scrap of dark with too many eyes.
