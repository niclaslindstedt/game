name: grigori_rasputin_1
family: rift
size: [24, 24]
description: >
  A tall gaunt front-facing figure in a long dark Orthodox cassock with rows of
  gold frog-braid clasps down the front, a pale hollow-eyed face with red-dot
  eyes and a long black beard, robe falling to a fringed hem. Mid-animation, the
  robe swayed and near-identical to the rest of the cycle. Reads as a brooding,
  unkillable mad monk.
