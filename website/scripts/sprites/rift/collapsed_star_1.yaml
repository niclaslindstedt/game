description: >
  A small violet-black translucent jellyfish drifter: a purple bell with a tiny
  pure-black event horizon and a magenta glint at its core, trailing four thin
  fading tendrils below. Darker and heavier-looking than a teal jelly. Here the
  tendrils hang slightly drawn up. Faintly see-through, phasing through solids.
