description: >
  A flickering, unstable smear of magenta and violet, roughly a lumpy vertical
  blob, with hard cyan fringing down its left edge and hot-pink fringing down its
  right — a corrupted sprite mid-tear. Here the glitch is offset the other way,
  the chromatic split flickering as it dodges. Reads as reality coming apart at
  the seam.
