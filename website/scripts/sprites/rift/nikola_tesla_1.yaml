description: >
  A lean front-facing man in a dark navy Victorian frock-suit, a pale face with
  slicked hair and small goggles, crackling arcs of cyan-white electricity
  leaping outward from both raised hands. Here the lightning has flashed to its
  alternate discharge, the bolts snapping wider off to the sides. Reads at a
  glance as an electric wizard in period dress.
