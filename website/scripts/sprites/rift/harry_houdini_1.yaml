name: harry_houdini_1
family: rift
size: [24, 24]
description: >
  A translucent teal ghost of a man, faintly luminous and see-through, with dark
  hair, hollow eyes and a golden padlock hung on his chest, his lower body
  tapering into two wispy dissolving legs. Here the apparition wavers mid-
  flicker, the trailing legs shifted as it fades. Reads as a spectral
  escapologist half-dissolved into the void.
