  counterfeit_outlaw: { splat: y, core: Y, scuff: H }
  one_armed_bandit: { splat: Q, core: K, scuff: N }
contrastExempt: [hardpan_0, hardpan_1, scrub_0, scrub_1, dry_shrub, tumbleweed]
