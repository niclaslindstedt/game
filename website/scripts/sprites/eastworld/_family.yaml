  D: "#5c3e28"
  I: "#ec60be"
  K: "#0c0b12"
  N: "#3a3644"
  Q: "#60f0d0"
  U: "#f0c658"
  X: "#963c46"
  Z: "#b08e60"
  d: "#665c34"
  e: "#8a7e46"
  s: "#c48e6c"
  u: "#e2c494"
  z: "#ceac78"
animations:
