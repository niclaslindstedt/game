name: haywire_greeter_1
family: eastworld
size: [16, 16]
description: >
  A top-down wheeled greeter android on a low dark chassis, with two glowing
  turquoise eyes and a pair of thin arms raised overhead in a stuck welcoming
  V — a welcome-committee host gone haywire, still smiling as it swings; a rare
  pack mob. Its raised arms are on the opposite beat of its broken hospitality
  loop, near-identical to the rest of the cycle.
