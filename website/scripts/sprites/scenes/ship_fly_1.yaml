name: ship_fly_1
family: scenes
size: [32, 24]
description: >
  A homemade rocket cruising through space in side profile, 32×24 px: the grey-
  and-white hull laid horizontal with its nose pointing right, a row of round
  portholes along the flank, and yellow-orange engine flames trailing from the
  tail on the left. The tail flames are flickered to a different, wispier shape
  for this thrust frame, so the exhaust reads as pulsing. Flat 16-bit style.
