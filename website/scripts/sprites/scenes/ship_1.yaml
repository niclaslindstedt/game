name: ship_1
family: scenes
size: [24, 32]
description: >
  A homemade rocket standing upright on the launch pad, 24×32 px: a slim grey-
  and-white hull with a pointed nose, a vertical row of round porthole windows
  down the body, and swept tail fins at the base — cold, engines off. Mid-idle-
  animation, near-identical to the rest of the cycle apart from a subtle shimmer
  of the hull. Flat 16-bit style.
