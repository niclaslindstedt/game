name: ship_fire_1
family: scenes
size: [24, 32]
description: >
  A homemade rocket standing upright at ignition, 24×32 px: a slim grey-and-
  white hull with a pointed nose, a vertical row of round portholes, and swept
  tail fins, with a bright yellow-orange engine flame and exhaust erupting from
  its base. The twin flame plumes are flickered to a splayed, uneven shape for
  this burn frame, so the fire reads as guttering. Flat 16-bit style.
