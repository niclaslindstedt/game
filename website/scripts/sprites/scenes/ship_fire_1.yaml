name: ship_fire_1
family: scenes
size: [24, 32]
description: >
  The upright garage rocket at ignition with its twin flame plumes splayed
  uneven — the guttering-fire frame of the burn cycle.
subject:
  kind: scene prop / rocket
  build: a slim upright rocket with a pointed nose and swept tail fins at the base
  features: a vertical row of round portholes down the hull; twin engine flames erupting from the base
  accent: the bright yellow-orange ignition flame, flickered to a splayed, uneven shape
  flavor: the guttering burn frame of the ignition cycle
