name: grass_1
family: earth
size: [16, 16]
description: >
  Litter variant of the Earth grass tile (see grass_0): the same seamless
  mid-green field speckled with green blades and brown dirt flecks, but with a
  small piece of dropped litter near the lower edge — a white-and-amber scrap
  (a discarded wrapper or butt) that scatters occasionally across the ground so
  the field reads as lived-in rather than pristine. 16x16 flat 16-bit pixel art.
