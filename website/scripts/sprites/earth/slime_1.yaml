name: slime_1
family: earth
size: [16, 16]
description: >
  A basic slime critter: a front-facing rounded purple blob, gelatinous, with
  a lighter lilac highlight across the top and a darker plum base, and a dark
  outline. It has two small dark dot eyes and a little open mouth, giving it a
  dopey, harmless read. This is the squash frame of its hop — the body is
  flattened low and spread wide, a broad squat puddle as it lands. 16x16 flat
  16-bit pixel art.
