<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- An installed PWA game is an app, not a document: lock pinch-zoom and
         iOS input auto-zoom, and let the canvas paint under the notch. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Must match manifest.webmanifest theme_color so the splash screen and
         the loaded app agree (§11.4.1). -->
    <meta name="theme-color" content="#0b0d10" />

    <!-- Brand-shaped strings below are `{{TOKENS}}` filled at build time from
         the identity config (game.config.json) by pwa/pwa-plugin.ts, so a
         rename touches one file, not this shell. -->
    <title>{{FULL_TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <link rel="canonical" href="{{SITE_URL}}/" />

    <meta property="og:site_name" content="{{TITLE}}" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{FULL_TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:url" content="{{SITE_URL}}/" />
    <meta property="og:image" content="{{SITE_URL}}/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="{{OG_IMAGE_ALT}}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{FULL_TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    <meta name="twitter:image" content="{{SITE_URL}}/og-default.png" />
    <meta name="twitter:image:alt" content="{{OG_IMAGE_ALT}}" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "@id": "{{SITE_URL}}/#game",
        "name": "{{TITLE}}",
        "url": "{{SITE_URL}}/",
        "description": "{{DESCRIPTION}}",
        "image": "{{SITE_URL}}/og-default.png",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any (web browser)",
        "gamePlatform": ["Web browser", "Progressive Web App"],
        "playMode": "SinglePlayer",
        "inLanguage": "en",
        "author": {
          "@type": "Person",
          "@id": "{{SITE_URL}}/#author",
          "name": "{{AUTHOR_NAME}}",
          "sameAs": ["{{AUTHOR_URL}}"]
        },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Prerendered shell (§11.3.1): real content crawlers can index without
           running JavaScript, and it doubles as the no-JS fallback. React
           replaces it with the live title screen. It's dressed as the game
           BOOTING — a starfield boot console rather than a document — so the
           hand-off to the real title screen reads as one continuous screen.
           Copy is injected from the identity config at build time. -->
      <main class="prelaunch">
        <div class="prelaunch-sky" aria-hidden="true"></div>
        <div class="prelaunch-console">
          <p class="prelaunch-eyebrow" aria-hidden="true">SYSTEM ONLINE</p>
          <h1 class="prelaunch-title">{{TITLE}}</h1>
          <p class="prelaunch-tagline">{{TAGLINE}}</p>
          <div class="prelaunch-brief">{{HERO_PARAGRAPHS}}</div>
          <p class="prelaunch-status" aria-hidden="true">
            <span class="prelaunch-caret"></span>BOOTING&hellip;
          </p>
          <p class="prelaunch-source">
            Source and dev docs live in the
            <a href="{{REPO_URL}}">GitHub repository</a>.
          </p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
