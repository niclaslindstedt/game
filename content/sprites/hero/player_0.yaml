description: >
  The hero suited up in a plain working EVA pressure suit — the suited
  paper-doll base the worn-armor and held-weapon layers composite onto.
subject:
  kind: hero paper-doll base, suited in his EVA pressure suit
  build: a short, stocky, top-heavy astronaut with broad shoulders
  attire: a plain white-and-grey EVA pressure suit — a big rounded helmet dome capping a compact bulky torso over stubby boots, a boxy grey life-support unit on the chest
  features: a horizontal gold visor band across the helmet, its lower edge glowing amber
  accent: a single small red indicator light set in the grey chest unit
  pose: a neutral idle stance, gloved hands empty and held low at the sides
  flavor: recovered working gear, not a sleek hero suit — the laid-off SpaceZ shipbuilder suited up
