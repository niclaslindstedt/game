name: charred_skeleton
family: effects
size: [16, 16]
description: >
  The smoking, charred skeleton a screen-nuke leaves where a monster burned up —
  scorched bones with a dark char outline and two ember-glow eye sockets.
subject:
  kind: aftermath effect
  build: a small front-facing skeleton — round skull, ribcage, stubby arm bones, pelvis, and two leg bones — drawn in dirty scorched bone against a near-black char outline
  accent: ember-orange eye sockets still glowing
  flavor: what is left of a monster caught in the blast; a wisp of smoke rises off it before it fades
palette:
  O: "#15100f" # scorched char outline
  b: "#b8b0a0" # dirty bone
  w: "#e7e0d0" # bone highlight
  e: "#ff6a1e" # ember glow
