name: vault_warden_1
family: bunker
size: [48, 48]
description: >
  THE VAULT WARDEN mid-attack — the treasury-door security mech rears its slab piston fists up for a slam, its single red optic flaring white-hot and the gold combination-dial on its chest lit amber.
subject:
  kind: boss
  name: THE VAULT WARDEN
  build: a hulking, broad-shouldered automated security mech, far larger than the human residents, bolted to the treasury door
  features: a small armored sensor head with one dominant glowing red optic eye, and a circular gold combination-dial emblem set into its broad chest
  accent: yellow-and-black hazard chevrons on the shoulders and base, and the gold vault-dial
  pose: both piston fists RAISED high beside the head in a slam windup, the red optic flaring white-hot, the gold vault-dial lit amber
  flavor: the CORE's own enforcer, the reason the vault locks from the outside — the vault mechanism made a body
