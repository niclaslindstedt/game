name: vault_door
family: bunker
size: [32, 40]
description: >
  The great treasury vault door in the far wall — a massive circular bank-vault
  door of dark steel with a gold-ringed rim, a central spoke wheel over a lit
  amber lock, framed by yellow-and-black hazard chevrons. The level's exit lies
  beyond it.
