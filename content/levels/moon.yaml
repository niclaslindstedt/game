description: |-
  LEVEL 2 - THE MOON. Ada's beacon dies near the old Apollo flag; ARMSTRONG
  haunts the far side. THE READ: an open lunar plain broken into FOUR BASINS by
  three rock RIDGES with OFFSET gaps that ALTERNATE low, high, low - a SERPENTINE
  SWEEP from the lander to the flag, threaded through the gaps (down the opening
  basin, up the second, back down the third, up to the flag). A SNAPPY level-2
  clear (~6 min, the second mission): the mobs TRACK the hero's own level as he
  climbs - an EVEN, fair-but-rising con, never a wall - and the knots are THINNED
  so the finite ridge-gap spawn points DRAIN and he clears them ON THE MOVE
  instead of getting pinned. It still feels like open floaty moon: low-gravity
  hops, craters to jump, slabs to break line of sight. TWO OFF-PATH DETOURS sit
  on the sweep's low turns - each an OPTIONAL walled pocket to dip into for a
  cache (the "explore for loot" lesson), left OFF the intended line: the CRASHED
  LANDER where the LOST COSMONAUT drifts a supply cache, and THE THIRTEENTH GRAVE
  where THE THIRTEENTH MAN keeps his own. Each is a quiet cul-de-sac (no ambient
  horde) holding a chest and its lone guardian. TEMPO: a gentle floaty-steering
  opener, a swell through the mid basins, a breather at the STILL POINT by the
  flag where the salvage merchant trades, then a final surge as ARMSTRONG wakes.
campaign: true
id: moon
index: 2
name: THE MOON
prelude:
  - launch
  - voyage_moon
music: regolith_ride
intro:
  - - ADA'S TRACKER WENT QUIET
    - SOMEWHERE NEAR THE OLD APOLLO
    - FLAG. THAT'S WHERE I'M HEADED.
  - - AND SOMETHING IS MOVING OUT
    - THERE IN THE DUST. THIS PLACE
    - IS SUPPOSED TO BE EMPTY.
  - - I KNOW THIS LANDING SITE FROM THE
    - OLD MISSION CHARTS. EVERY CRATER.
    - THE FASTEST LINE RUNS TO THAT FLAG.
  - - KEEP MOVING. I'M COMING, ADA.
width: 2400
height: 1600
gravity: 340
biome: moon
tiles:
  ground:
    common: moon_0
    rare: moon_1
    rareEvery: 23
  patch:
    a: gravel_0
    b: gravel_1
    every: 7
foes: GHOSTS
merchant:
  sprite: merchant_moon
  greeting:
    - - YOU'RE SOLID. THAT'S NEW.
      - I CAME UP WITH THE '76 SALVAGE
      - RUN. MISSED THE RIDE HOME.
    - - THE GHOSTS DON'T CARRY COIN,
      - SO YOU'RE MY WHOLE MARKET NOW.
      - SELL ME SCRAP. BUY WHAT WORKS.
  returnGreeting:
    - STILL BREATHING, I SEE.
    - GOOD - MY ONLY CUSTOMER.
playerSpawn:
  x: 340
  y: 1320
landmarks:
  - kind: lander
    pos:
      x: 280
      y: 1320
  - kind: flag
    pos:
      x: 2130
      y: 260
    anchor: base
objective:
  type: killBoss
# METEOR RAIN - the moon has no air to burn them up, so rocks fall out of the
# black sky and slam the regolith near the hero: a firming ground shadow
# telegraphs each impact, then it DETONATES - vaporizing weak mobs at the core,
# flinging the rest (and the hero) to the sides, and punching a fresh crater
# into the plain (the moon is pocked with them for a reason). A GENTLE cadence
# on the second mission: a rare, dodgeable spectacle that rewards reading the
# ground, never a barrage. Craters use the surface's own scar sprites.
asteroids:
  everyMs:
    - 4600
    - 8000
  craterSprites:
    - crater_small
    - crater_big
# THE INTENDED PATH: the SERPENTINE SWEEP through the alternating ridge gaps
# from the lander to ARMSTRONG. The autopilot follows it (so it rounds the
# ridges instead of wedging) and the app points its "go this way" arrow along
# it. Each leg threads the next basin's offset gap: LOW out of the lander (past
# the CRASHED LANDER dip), UP the full height of basin two, back DOWN through
# basin three, then UP the boss basin (past THE THIRTEENTH GRAVE dip) to the
# STILL POINT and the flag.
path:
  - x: 340
    y: 1320
  - x: 520
    y: 1360
  - x: 700
    y: 1300
  - x: 880
    y: 1140
  - x: 1020
    y: 720
  - x: 1180
    y: 420
  - x: 1340
    y: 520
  - x: 1520
    y: 960
  - x: 1690
    y: 1300
  - x: 1880
    y: 1260
  - x: 1900
    y: 600
  - x: 2130
    y: 260
rareSpawns:
  rare:
    - moonstruck_mourner
    - lost_cosmonaut
  unique:
    - the_thirteenth_man
spawns:
  # The four speaking elites, pinned along the sweep so the conspiracy unspools
  # in order — the grave under the dust, the corporate claim, the quarantine,
  # and Ada's trail — each guarding the basin its keycard/loot belongs to.
  # Levels ramp with the basin; HP scales up the campaign ladder.
  - enemy: apollo_ghost
    at:
      x: 880
      y: 1120
    ramp: brutal
    hp: 200
  - enemy: prospector
    at:
      x: 1040
      y: 720
    ramp: merciless
    hp: 220
  - enemy: quarantine_medic
    at:
      x: 1340
      y: 500
    ramp: monstrous
    hp: 240
  - enemy: cartographer
    at:
      x: 1560
      y: 940
    ramp: endgame
    hp: 220
  # The two detour guardians, PINNED (not just random rares) inside each pocket
  # off the sweep's low turns — the whole reward for exploring a dead end. The
  # opener's guardian cons EVEN (~L11); the boss-basin one cons RED (~L17), part
  # of the map's rising con — the swarm gets tougher the closer the flag comes.
  - enemy: lost_cosmonaut
    at:
      x: 500
      y: 1470
    ramp: savage
    hp: 160
  - enemy: the_thirteenth_man
    at:
      x: 1980
      y: 1440
    ramp: endgame
    hp: 300
  - enemy: armstrong
    at:
      x: 2130
      y: 260
    ramp: endgame
    hp: 450
safeZones:
  # THE STILL POINT: a calm nook on the last climb to the flag, so the horde is
  # repelled off the boss approach and the hero (and the autopilot) walks in
  # clean. A breather + the salvage merchant before ARMSTRONG (who haunts the
  # flag ~410px north-east, well outside the zone).
  - shape: circle
    pos:
      x: 1900
      y: 600
    radius: 175
    label: STILL POINT
quietZones:
  # The two detour pockets are dead cul-de-sacs — no ambient horde spawns
  # inside, so poking in for the chest and its lone guardian stays calm. Each
  # rect hugs the pocket walls, entrance (the top) left open.
  - shape: rect
    rect:
      x: 380
      y: 1410
      width: 280
      height: 180
    label: CRASHED LANDER
  - shape: rect
    rect:
      x: 1800
      y: 1350
      width: 360
      height: 210
    label: THE THIRTEENTH GRAVE
chests:
  # The two off-path caches — the payoff for the detour. Each sits deep in its
  # pocket, off the walls, so its chrome reads against the dust.
  - at:
      x: 520
      y: 1500
  - at:
      x: 1980
      y: 1480
  # A third cache far up the NW corner — the serpentine never passes it, so
  # only a deliberate walk into the empty dark finds it.
  - at:
      x: 260
      y: 260
tempo:
  # Build-and-release over the serpentine: a gentle floaty-steering opener, a
  # swell through the mid basins, a breather at the STILL POINT / shop beat,
  # then a surge for ARMSTRONG.
  - at: 0
    intensity: 0.5
  - at: 0.16
    intensity: 0.85
  - at: 0.42
    intensity: 1.15
  - at: 0.66
    intensity: 1
  - at: 0.84
    intensity: 0.68
  - at: 1
    intensity: 1.4
merchantSpawns:
  # Primary: the STILL POINT nook before the flag. Secondary: the mid basin by
  # the prospector, so the trader sometimes greets the hero mid-climb.
  - x: 1900
    y: 640
  - x: 1040
    y: 760
spawners:
  # THE HORDE AS FINITE SPAWN POINTS (not a bottomless wave): one knot per LEG of
  # the serpentine, each arming as the hero sweeps into it (wide `triggerRadius`
  # so a cut corner still trips it) and DRAINING its count — the mobs give chase,
  # so he clears them ON THE MOVE, then walks on to an empty patch. Counts sum to
  # ~275 across the sweep (thinned hard from a heavier "clear the whole moon"
  # battle so the finite knots actually DRAIN and a snappy ~6-min clear reaches
  # the flag — a fat horde never drained, so the hero stayed pinned in the basins
  # and never made the boss), back-loaded so the opener stays the gentle
  # onboarding knot and the basins swell toward it. `maxAlive` is a low 10 so only
  # a handful chase at once — steady local pressure the hero out-DPSes, not a pin,
  # and `lingering` is a short 4–5 so chasers give up and he can advance. The mob
  # TYPE ramps basin to basin (wisps → ghosts → wraiths → OPTIMUSK, the tanky
  # optimusks kept to the last two knots only so they never wall the mid sweep)
  # and the per-point `mobLevels` TRACK the hero's own climb (opener ~L4, boss bay
  # ~L10 on easy) for an even, fair-but-rising con — never the old wall that
  # death-spiralled the hero back to the lander. Easy's active-spawner cap (2)
  # lights only the two nearest knots, spreading the fight across the whole moon.
  # The per-map XP cap bounds how far a clear levels him.
  # --- Opening basin, low out of the lander. ---
  - id: open
    at: { x: 500, y: 1280 }
    maxAlive: 10
    ramp: meek
    triggerRadius: 560
    lingering: 5
    members:
      - enemy: wisp
        count: 44
  # --- Low turn into basin two, past the first ridge gap. ---
  - id: low
    at: { x: 900, y: 1120 }
    maxAlive: 10
    ramp: bold
    triggerRadius: 520
    lingering: 5
    members:
      - enemy: wisp
        count: 32
      - enemy: ghost
        count: 14
  # --- The full climb UP basin two toward the high gap. ---
  - id: climb
    at: { x: 1040, y: 720 }
    maxAlive: 10
    ramp: fierce
    triggerRadius: 500
    lingering: 5
    members:
      - enemy: wisp
        count: 16
      - enemy: ghost
        count: 26
      - enemy: wraith
        count: 6
  # --- Top of basin three, entering high from the ridge-B gap. ---
  - id: top
    at: { x: 1360, y: 520 }
    maxAlive: 10
    ramp: savage
    triggerRadius: 500
    lingering: 5
    members:
      - enemy: ghost
        count: 30
      - enemy: wraith
        count: 14
  # --- The descent DOWN basin three toward the low ridge-C gap. ---
  - id: desc
    at: { x: 1540, y: 980 }
    maxAlive: 10
    ramp: brutal
    triggerRadius: 500
    lingering: 5
    members:
      - enemy: ghost
        count: 24
      - enemy: wraith
        count: 20
  # --- Low turn into the boss basin, past THE THIRTEENTH GRAVE. ---
  - id: low4
    at: { x: 1860, y: 1180 }
    maxAlive: 10
    ramp: merciless
    triggerRadius: 480
    lingering: 5
    members:
      - enemy: wraith
        count: 16
      - enemy: ghost
        count: 10
      - enemy: optimusk
        count: 4
  # --- The boss basin's climb: a last surge as ARMSTRONG stirs. Pinned on the
  # APPROACH below the STILL POINT (not on the flag) and kept LIGHT, so the hero
  # clears it climbing, breathes at the shop, then walks into the boss CLEAN —
  # the surge thickens the road to ARMSTRONG instead of a horde that floods the
  # boss melee and kites the hero off him. ---
  - id: bay
    at: { x: 1980, y: 820 }
    maxAlive: 8
    ramp: monstrous
    triggerRadius: 320
    lingering: 4
    members:
      - enemy: wraith
        count: 12
      - enemy: optimusk
        count: 3
      - enemy: ghost
        count: 6
walls:
  # === ROCK RIDGES: three long rubble spines that break the plain into FOUR
  # basins, each leaving ONE wide OFFSET pass-gap that ALTERNATES low, high, low
  # — so the sweep threads LOW, climbs to round the HIGH gap, drops back through
  # the LOW gap, then climbs the boss basin. Wide gaps on purpose — a pressured
  # hero (and the autopilot) rounds them without pixel-perfect lining-up. ===
  # --- Ridge A (x=680), gap LOW (y 1040-1600 open): the hero stays low out of
  # the lander and rounds the spine's bottom. ---
  - kind: boulder
    from:
      x: 680
      y: 200
    to:
      x: 680
      y: 1040
    radius: 13
    jumpable: false
  # --- Ridge B (x=1180), gap HIGH (y 200-640 open): the hero climbs the full
  # height of basin two to round it. ---
  - kind: boulder
    from:
      x: 1180
      y: 640
    to:
      x: 1180
      y: 1600
    radius: 13
    jumpable: false
  # --- Ridge C (x=1680), gap LOW (y 1000-1600 open): the hero drops back down
  # through basin three into the boss basin. ---
  - kind: boulder
    from:
      x: 1680
      y: 200
    to:
      x: 1680
      y: 1000
    radius: 13
    jumpable: false
  # === CRASHED LANDER detour (a dip below the opening basin) — the LOST
  # COSMONAUT drifts a supply cache in this walled wreck; entrance is the top
  # gap the sweep passes over. ===
  - kind: boulder
    from:
      x: 400
      y: 1420
    to:
      x: 400
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 640
      y: 1420
    to:
      x: 640
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 400
      y: 1592
    to:
      x: 640
      y: 1592
    radius: 13
    jumpable: false
  # === THE THIRTEENTH GRAVE detour (a dip at the bottom of the boss basin) — a
  # deep walled crater the THIRTEENTH MAN keeps; entrance is the top gap the
  # sweep passes over on its way up to the flag. ===
  - kind: boulder
    from:
      x: 1820
      y: 1380
    to:
      x: 1820
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 2140
      y: 1380
    to:
      x: 2140
      y: 1592
    radius: 13
    jumpable: false
  - kind: boulder
    from:
      x: 1820
      y: 1592
    to:
      x: 2140
      y: 1592
    radius: 13
    jumpable: false
