spawners:
  # Finite spawn points threaded along the route, each carrying a con RAMP so
  # difficulty climbs west (desert, meek) to east (boss, monstrous) instead of
  # sitting flat. maxAlive is kept MODERATE (12) so each point arrives as a
  # burst the hero punches THROUGH and advances past - not a slow dribble he has
  # to wait out - and counts are trimmed hard from the old ~1150 wave budget so
  # the whole route (and the boss) is reachable well inside the run.
  # --- ACT 1: the desert (meek -> bold), open ground, gentle pressure ---
  - id: p0
    at: { x: 460, y: 780 }
    maxAlive: 11
    triggerRadius: 320
    ramp: meek
    members:
      - enemy: scout_rover
        count: 26
  - id: p1
    at: { x: 790, y: 930 }
    maxAlive: 11
    ramp: meek
    members:
      - enemy: scout_rover
        count: 26
  - id: p2
    at: { x: 1090, y: 650 }
    maxAlive: 12
    ramp: bold
    members:
      - enemy: scout_rover
        count: 34
  # --- ACT 2: the colony (fierce -> monstrous), four points up the serpentine ---
  - id: p3
    at: { x: 1720, y: 850 }
    maxAlive: 12
    ramp: fierce
    members:
      - enemy: scout_rover
        count: 26
      - enemy: servo_bot
        count: 32
  - id: p4
    at: { x: 2000, y: 540 }
    maxAlive: 12
    ramp: savage
    members:
      - enemy: servo_bot
        count: 36
      - enemy: fembot
        count: 28
  - id: p5
    at: { x: 2250, y: 720 }
    maxAlive: 12
    ramp: brutal
    members:
      - enemy: fembot
        count: 32
      - enemy: servo_bot
        count: 28
  # The last knot sits ~280px SHORT of the boss so ELON MOSQUE's arena stays a
  # duel: clear this then close on the boss with room to trade blows, instead of
  # being pinned against him by a swarm spawning on his doorstep.
  - id: p6
    at: { x: 2400, y: 600 }
    maxAlive: 10
    ramp: monstrous
    members:
      - enemy: fembot
        count: 26
      - enemy: optimusk
        count: 14
# BUILD-AND-RELEASE: a floaty desert opener, a swell at the LARRY gate, a
# breather at the airlock / merchant, then a hard climb to the surge at MOSQUE.
tempo:
