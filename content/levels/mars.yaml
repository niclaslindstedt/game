safeZones:
  # THE AIRLOCK: the calm threshold between the desert and the colony. The horde
  # is repelled off the approach so the breather + the merchant read clean before
  # ACT 2. LARRY haunts the gate ~230px north-west, well outside the zone.
  - shape: circle
    pos:
      x: 1410
      y: 800
    radius: 110
    label: AIRLOCK
quietZones:
  # THE TERRARIUM: the SE keycard pocket is a dead cul-de-sac - no ambient horde
  # spawns inside, so the optional dip for the chest, the tribute, and the shrine
  # stays calm. Hugs the terrarium walls, entrance (the NE door) left open.
