description: |-
  LEVEL 3 - MARS. A two-act assault on SpaceZ's secret colony, read left to
  right. ACT 1 is the open red desert: a low-pressure scramble over rover-worked
  dust that RISES to LARRY WEBPAGE, the fembot foreman guarding the dome airlock
  - the desert earns its size before you're let inside. A breather + the colony
  merchant wait at the airlock threshold. ACT 2 is the colony proper: deck
  plating, the servo and fembot lines, and a con that CLIMBS hard through a tight
  serpentine (BUILD GATES at the entry, OPTIMUSK PRIME mid, PETER SEAL on the
  approach) to ELON MOSQUE at the far north-east - the man who owns the planet,
  who doesn't die but flees into a rift. Two airlock gaps funnel the horde. The
  TERRARIUM is an OPTIONAL keycard detour locked in the SE corner: grab the green
  keycard off the main line, dip south for a chest and the shrine, rejoin. The
  feel: a rising power fantasy that starts as a dusty patrol and ends storming a
  billionaire's dome.
campaign: true
id: mars
index: 3
name: MARS
prelude:
  - moon_depart
  - voyage_mars
music: red_dust
intro:
  - - HE SAID THE MOON WAS SPACEZ'S BIG
    - MISTAKE - THE COMPANY PACKED IT
    - ALL INTO CRATES AND RAN. TO MARS.
  - - I KNOW WHAT A SPACEZ COLONY LOOKS
    - LIKE - I REBUILT THEIR LANDER ONCE.
    - DOMES. ROBOTS. SECRETS.
  - - SOMEBODY DOWN HERE TRADED MY
    - GIRL AWAY LIKE CARGO.
    - BAD TRADE. FOR THEM.
width: 2800
height: 1500
gravity: 520
biome: mars
tiles:
  ground:
    common: mars_0
    rare: mars_1
    rareEvery: 19
  patch:
    a: rust_0
    b: rust_1
    every: 7
  zones:
    - rect:
        x: 1560
        y: 0
        width: 1240
        height: 1500
      ground:
        common: deck_0
        rare: deck_1
        rareEvery: 13
      patch:
        a: vent_0
        b: vent_1
        every: 9
foes: MACHINES
# Small sand storms roll across the red planet: every so often a churning dust
# gust drifts in from off-screen and sweeps the hero's surroundings. Walk clear
# and it's harmless; stand in its path and it flattens you - a bite of damage
# and a knockout, prone on the dirt for a couple of seconds while it passes over
# and fades. Tuning (speed, size, damage, knockout length) lives in config
# SANDSTORMS / DifficultyDef.sandstormDamageFrac.
sandstorms:
  everyMs:
    - 9000
    - 16000
merchant:
  sprite: merchant_mars
  greeting:
    - - A BREATHING CUSTOMER. AT LAST.
      - I RAN THE COLONY COMMISSARY
      - TILL THE AI RAN THE NUMBERS.
    - - IT KEPT THE DOME. I KEPT THE
      - SCALES. SELL ME WHAT THE
      - MACHINES DROP - BUY WHAT HELPS.
  returnGreeting:
    - THE LIVE ONE RETURNS.
    - SCALES ARE STILL HONEST.
# The trader keeps the airlock threshold - the calm nook between the desert and
# the colony, so the restock lands right before ACT 2 opens.
merchantSpawns:
  - x: 1410
    y: 800
playerSpawn:
  x: 300
  y: 750
landmarks:
  - kind: starship
    pos:
      x: 170
      y: 750
  - kind: billboard
    pos:
      x: 760
      y: 470
    anchor: base
  - kind: shrine
    pos:
      x: 2620
      y: 1290
    anchor: base
objective:
  type: killBoss
# THE INTENDED ROUTE - a left-to-right serpentine. ACT 1 sweeps the desert low
# then climbs to LARRY at the airlock; ACT 2 threads the two wall gaps in an S
# (up to OPTIMUSK, down through the inner gap, along to PETER, up to the boss).
# The optional TERRARIUM detour is deliberately NOT on this line.
