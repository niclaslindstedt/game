  # ACT 1 gate - the fembot foreman at the dome airlock. A step above the desert
  # fodder, not a wall (fierce ramp), read yellow-orange against a green field.
  - enemy: larry_webpage
    at:
      x: 1200
      y: 540
    ramp: fierce
    hp: 260
  # ACT 2 elites, climbing the colony serpentine toward the boss.
  - enemy: build_gates
    at:
      x: 1740
      y: 820
    ramp: brutal
    hp: 250
  - enemy: optimusk_prime
    at:
      x: 1980
      y: 470
    ramp: merciless
    hp: 340
  # Moved OUT of the SE terrarium cul-de-sac onto the open colony approach, so
  # the fight no longer pins the hero (and the bot) in a concave dead end.
  - enemy: peter_seal
    at:
      x: 2360
      y: 580
    ramp: endgame
    hp: 280
  - enemy: elon_mosque
    at:
      x: 2640
      y: 760
    ramp: apex
    hp: 700
packs:
