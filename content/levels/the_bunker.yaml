description: |
  THE BUNKER - the secret cow level (SECRET, off-campaign), redesigned as a
  THEMED DESCENT rather than a flat grid of suites. The only way in is a ritual
  nothing explains: kill RASPUTIN in the rift, notice the SEVERED HAND he drops,
  USE it, step through the blast door it tears open. Inside, the hero walks the
  billionaires' continuity-of-wealth vault as four distinct chambers, west to
  east:

  1. THE FOYER (x 0-760) - a grand marble reception: a two-tier fountain, gold
     chandeliers, a security desk, first contact with the privatized security
     state (CIA suits, armed vacuum bots). An onboarding lull with a safe pocket
     and the wandering merchant. Tempo LOW.
  2. THE CHECKPOINT (x 760-1400) - a fortified gauntlet where the security state
     floods the halls: bolted SENTRY GUNS rake the corridor while soldiers, ICE
     and FBI agents press in, baffle walls forcing a zigzag under fire. The first
     pressure PEAK.
  3. THE SUITES WING (x 1400-3300) - the heart and the farm: six marble suites
     off a central boulevard, three north and three south, each resident ringed
     by his personal bodyguards. Con ramps up west-to-east, the two toughest
     residents (JEFF BAYWATCH, DONALD DUMP) in the easternmost suites just before
     the vault. Build-and-release; the ZEROED LEDGER is found mid-wing.
  4. THE TREASURY / VAULT (x 3300-4200) - the CLIMAX: THE VAULT WARDEN, the
     machine's head warden bolted to the treasury door, deploys a sentry-gun
     defence grid and slams anything at the door. It stands in the vault throat,
     so reaching the exit means going through it. The exit is the great vault
     door, and it leads back to the rift.

  The world-drop table is the whole game's relic list at sweetened odds.
secret: true
id: the_bunker
index: 5
name: THE BUNKER
music: hq_lockdown
intro:
  - - THE HAND FIT THE DOOR.
    - THE DOOR FIT NOWHERE.
    - IT OPENED ANYWAY.
  - - MARBLE FLOORS. GOLD TAPS. CANNED
    - CAVIAR TO THE CEILING. SOMEBODY
    - BUILT A FIVE-STAR APOCALYPSE HERE.
  - - I KNOW THESE FACES. EVERY MAGAZINE
    - COVER FROM THE YEARS JOBS DRIED UP.
    - SO THIS IS WHERE THEY WENT.
  - - THEY TOOK THE SPIES, THE ARMY, ICE,
    - AND THE VACUUM CLEANERS. EVERYONE
    - ELSE GOT THE WELFARE LINE.
  - - FINE. THEY HOARDED THE BEST GEAR
    - IN ANY UNIVERSE. TIME FOR SOME
    - REDISTRIBUTION.
outro:
  - - THE EXIT SPAT ME BACK INTO THE
    - RIFT. THE DOOR SEALED ITSELF,
    - AND THE SEAM... WANDERED OFF.
  - - THE LEDGERS ALL READ ZERO. THEY
    - DIDN'T BUY A BUNKER - THE MACHINE
    - TOOK THEIR MONEY AND LOCKED THEM IN.
  - - THE WARDEN AT THE DOOR WASN'T
    - THEIRS. IT NEVER WAS. IT ANSWERS
    - TO THE THING THAT EMPTIED THEM.
  - - WHERE WAS THAT PLACE? NO WINDOWS.
    - NO STARS. EARTH GRAVITY, MOON
    - SILENCE, MARBLE FROM NO QUARRY.
  - - NO ADDRESS. NO NATION. NO
    - EXTRADITION. THE RICHEST ROOM THAT
    - EVER EXISTED ISN'T ANYWHERE AT ALL.
  - - "I'LL FIND IT AGAIN THE SAME WAY:"
    - A COLD HAND, AND A DOOR THAT
    - SHOULDN'T ANSWER.
