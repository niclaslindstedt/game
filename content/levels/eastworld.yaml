  # MAIN STREET is built from the deterministic `buildings:` block below - two
  # rows of frontier buildings line the lane and FUNNEL the hero west->east down
  # the middle, with narrow alley gaps between them. The wall segments here are
  # just the CORRAL fence, the COMPOUND fence + door, and the GROK cover rocks.
  # THE CORRAL - a fenced pocket off the SOUTH of the street hiding a chest. An
  # opt-in dare: dip out of the lane, past the horde, for the reward. The NORTH
  # side (facing the street) is left open as the entrance; the other three sides
