# THE INTENDED ROUTE - a west-to-east march down Main Street that weaves gently
# up and down the lane between the storefront facades, passing the staff in
# walking order, dipping up to the SALOON (merchant), and closing on SEAGULL's
# gate and the compound finale.
path:
  - x: 300
    y: 800
  - x: 620
    y: 800
  - x: 960
    y: 770
  - x: 1240
    y: 840
  - x: 1520
    y: 760
  - x: 1780
    y: 830
  - x: 2060
    y: 770
  - x: 2280
    y: 820
  - x: 2420
    y: 790
  - x: 2760
    y: 800
  - x: 2940
    y: 780
objective:
  type: killBoss
# SPINNING HAY BALLS: the park's western prop hazard. Bales roll in from the
# right (east) and bounce straight down Main Street to the left, spinning as
# they go. A bale caught on the grounded hero costs a very slight bite of hp and
# SHOVES him left, back down the street he came - he has to step out of its lane
# (or jump it) to stop being pushed. A rolling-tumbleweed nuisance that fits the
# west-to-east march without threatening the pinned duels.
hayBalls:
  everyMs:
    - 1600
    - 3000
rareSpawns:
  rare:
    - haywire_greeter
    - counterfeit_outlaw
  unique:
    - one_armed_bandit
spawns:
  # Ambient drift, banded across the run - a thin scatter of hosts over the whole
  # street on top of the placed knots below, so the lane is never truly empty
  # between spawners.
  - enemy: cowbot
    count: 22
    band:
      - 0
      - 0.35
  - enemy: saloon_brawler
    count: 10
    band:
      - 0.3
      - 0.65
  - enemy: tin_outlaw
    count: 10
    band:
      - 0.5
      - 0.9
  - enemy: longhorn
    count: 5
    band:
      - 0.6
      - 1
  # ---- The celebrity staff, pinned along Main Street in WALKING ORDER and
  # SPREAD across the width (each an offset, clean duel), con climbing west->east.
  # EDWARD SNOW - the first staff fight: the game's ranged elite, leaking from
  # cover on Main Street (takesCover uses the buildings), near the town's north
  # shopfronts.
  - enemy: edward_snow
    at:
      x: 1160
      y: 770
    ramp: savage
    hp: 480
  # GERALD DEPARDIEU - the avalanche, parked off the road to the SOUTH like a
  # landslide: a slow heavy the greedy detour toward, well clear of the lane.
  - enemy: gerald_depardieu
    at:
      x: 1360
      y: 1200
    ramp: brutal
    hp: 950
  # VLADIMIR PUTAIN - the owner, holding the TOWN SQUARE dead-centre on the lane.
  - enemy: vladimir_putain
    at:
      x: 1820
      y: 800
    ramp: merciless
    hp: 700
  # STEVEN SEAGULL - the co-founder guarding the compound gate; drops the keycard
  # that opens the CONTROL door. The last elite, so he cons hot (endgame) and
  # sits just short of the fence.
  - enemy: steven_seagull
    at:
      x: 2360
      y: 800
    ramp: endgame
    hp: 520
  # ---- THE COMPOUND FINALE, behind SEAGULL's gate.
  - enemy: elon_mosque_eastworld
    at:
      x: 2620
      y: 900
    ramp: apex
    hp: 900
  - enemy: grok_alpha
    at:
      x: 2700
      y: 640
    ramp: apex
    hp: 380
  - enemy: grok_beta
    at:
      x: 2780
      y: 960
    ramp: apex
    hp: 380
  - enemy: grok_gamma
    at:
      x: 3020
      y: 700
    ramp: apex
    hp: 380
  - enemy: zai_supercore
    at:
      x: 2900
      y: 800
    ramp: apex
    hp: 1400
packs:
  # Dormant clusters woken by proximity, threaded on the mid-to-late street so
  # the march is punctuated by alley ambushes as the mix hardens.
  - at:
      x: 1060
      y: 785
    members:
      - enemy: cowbot
        count: 5
  - at:
      x: 1560
