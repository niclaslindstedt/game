        count: 2
spawners:
  # Finite spawn points THREADED DOWN MAIN STREET (west -> east), OFFSET from the
  # pinned staff (>=180px) so each celebrity stays a clean duel. Each knot carries
  # a con RAMP so difficulty CLIMBS from a meek cowbot greeting at the gate to a
  # longhorn-heavy crush at the compound. Counts/maxAlive are kept MODERATE so
  # each knot arrives as a burst the hero punches THROUGH and advances past, and
  # the mob MIX hardens with the ramp (cowbot -> saloon brawler -> tin outlaw ->
  # longhorn).
  - id: p0
    at: { x: 520, y: 800 }
    maxAlive: 13
    triggerRadius: 360
    ramp: meek
    members:
      - enemy: cowbot
        count: 40
  - id: p1
    at: { x: 820, y: 780 }
    maxAlive: 13
    ramp: bold
    members:
      - enemy: cowbot
        count: 40
  - id: p2
    at: { x: 1120, y: 805 }
    maxAlive: 14
    ramp: fierce
    members:
      - enemy: cowbot
        count: 28
      - enemy: saloon_brawler
        count: 18
  - id: p3
    at: { x: 1420, y: 820 }
    maxAlive: 14
    ramp: savage
    members:
      - enemy: cowbot
        count: 18
      - enemy: saloon_brawler
        count: 24
  - id: p4
    at: { x: 1720, y: 800 }
    maxAlive: 14
    ramp: brutal
    members:
      - enemy: saloon_brawler
        count: 22
      - enemy: tin_outlaw
        count: 22
  - id: p5
    at: { x: 2020, y: 815 }
    maxAlive: 14
    ramp: merciless
    members:
      - enemy: tin_outlaw
        count: 28
      - enemy: longhorn
        count: 6
  - id: p6
    at: { x: 2220, y: 785 }
    maxAlive: 13
    ramp: monstrous
    members:
      - enemy: tin_outlaw
        count: 22
      - enemy: longhorn
        count: 8
  # The last knot sits ~180px SHORT of SEAGULL so the gate fight stays a duel:
  # clear this, take the keycard, then open the compound with room to breathe.
  - id: p7
    at: { x: 2180, y: 825 }
    maxAlive: 12
    ramp: monstrous
    members:
      - enemy: longhorn
        count: 9
      - enemy: tin_outlaw
        count: 14
