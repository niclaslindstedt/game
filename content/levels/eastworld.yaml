merchant:
  sprite: merchant_eastworld
  name: THE BARKEEP
  greeting:
    - - WELL HOWDY. MIND THE GLASSES -
      - THE ROBOTS DON'T DRINK, BUT
      - THEY TIP IN PARTS.
    - - YES, IT'S ME. A MARKET FELL
      - THROUGH A RIFT AND I FELL WITH
      - IT. THE HAT IS NEW.
    - - I'VE COME INTO SOME... ESTATE
      - PIECES. THE OWNER'S WARDROBE.
      - PRICES FIRM. BRING WATCHES.
  returnGreeting:
    - WELL, LOOK WHO'S BACK.
    - SAME STOOL, PARTNER?
  stockUniques:
    - putains_tracksuit
    - the_kremlin_ushanka
    - honorary_black_belt
