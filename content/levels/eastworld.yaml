tempo:
  # BUILD-AND-RELEASE down Main Street: a friendly cowbot greeting at the gate, a
  # swell as the mix hardens through the town, a breather at the SALOON (merchant),
  # then a hard climb to the longhorn crush and the surge at the compound finale.
  - at: 0
    intensity: 0.5
  - at: 0.2
    intensity: 0.85
  - at: 0.38
    intensity: 1.1
  - at: 0.5
    intensity: 0.7
  - at: 0.72
    intensity: 1.18
  - at: 0.9
    intensity: 1.32
  - at: 1
    intensity: 1.45
safeZones:
  # THE SALOON: a bubble of calm just north of the mid-street where THE BARKEEP
  # surfaces. The horde is repelled out so the restock reads clean before the back
  # half of the town. PUTAIN and his square sit ~200px south-east, outside it.
  - shape: circle
    pos:
      x: 1660
      y: 600
    radius: 100
    label: SALOON
quietZones:
  # THE CORRAL: a fenced SOUTH pocket, no ambient host spawns inside, so the
  # optional dip for the chest stays calm. Hangs off the main line - a dare, not
  # a demand. Entrance left open on the north side.
  - shape: rect
    rect:
      x: 1720
      y: 1240
      width: 400
      height: 320
    label: CORRAL
