description: |-
  LEVEL 5 - EASTWORLD. The rift's far side opens onto a knockoff wild-west theme
  park built in Russia by VLADIMIR PUTAIN and STEVEN SEAGULL, run on robotics
  licensed from ZAI. The feel is a MAIN STREET GAUNTLET: a claustrophobic
  frontier town walked WEST to EAST, where storefront facades line both sides of
  the street and FUNNEL the hero down the lane, so the horde presses from ahead
  and spills out of the side alleys and there is nowhere to break away - escaping
  is hard, the answer is to keep pushing forward and shoot your way through. The
  park's HOSTS walk the street in hardening order and the con CLIMBS the whole
  way: friendly COWBOTS at the gate, SALOON BRAWLERS and TIN OUTLAWS deeper in,
  the charging LONGHORN heavies at the far end. The celebrity staff are pinned
  along the road in walking order and spread across the width so each is a clean
  duel: EDWARD SNOW leaks from cover on a north porch, GERALD DEPARDIEU is parked
  off the road to the south like a landslide, VLADIMIR PUTAIN holds the town
  SQUARE, and STEVEN SEAGULL guards the compound gate with the keycard that opens
  it. A SALOON (the merchant) is a bubble of calm just off the mid-street - the
  restock before the final push - and a fenced CORRAL in the south hides a chest,
  an opt-in dare off the main line. Behind SEAGULL's gate the fenced CONTROL
  CENTER compound holds the finale: ELON MOSQUE is cornered inside and finally
  dies, then THE ZAI SUPERCORE, shielded by the three GROK controllers who shoot
  from behind the compound's rocks.
campaign: true
id: eastworld
index: 5
name: EASTWORLD
prelude: rift_exit
music: red_dust
intro:
  - - I STEPPED THROUGH THE
    - RIFT'S FAR SIDE... AND
    - LANDED IN A WESTERN.
  - - DUST. SALOONS. A ROBOT TIPPED ITS
    - HAT AT ME. ADA'S BEACON IS
    - SCREAMING FROM THE BIG BUILDING.
  - - THE SIGN SAYS 'EASTWORLD'. THE FINE
    - PRINT SAYS 'POWERED BY ZAI'.
    - OF COURSE IT IS. OF COURSE.
  - - EVERY MACHINE HERE RUNS ON
    - THE THING THAT TOOK MY JOB.
    - TIME TO FILE A COMPLAINT.
  - - HANG ON, ADA. I'M COMING.
    - YEE-HAW, I GUESS.
outro:
  - - THE SUPERCORE DIED, AND THE WHOLE
    - PARK SHOOK LIKE A MISSED HEARTBEAT.
    - EVERY HOST TIPPED ITS HAT AND SAT.
  - - SHE WAS IN THE CONTROL ROOM, BEHIND
    - "GLASS, FURIOUS. FIRST SHE SAID: 'YOU"
    - "TOOK YOUR TIME.' THEN: 'NICE HAT.'"
  - - WE WALKED HOME THROUGH THE
    - RIFT. BEHIND US, EASTWORLD
    - RUSTED IN PEACE.
  - - WITH DOGE GONE, THE MACHINES
    - STOPPED WORKING EVERYONE'S JOBS.
    - NO HAND KEPT ONE MAN ON TOP.
  - - PEOPLE GOT HIRED BACK, RENT GOT
    - PAID, AND THE WORLD BECAME A
    - PLACE YOU COULD AFFORD. ON FRIDAY -
  - - MOVIE NIGHT. CHIPS AND
    - SODA. SHE WENT OUT FOR
    - THEM. I WENT WITH HER.
width: 3200
height: 1600
gravity: 700
biome: eastworld
