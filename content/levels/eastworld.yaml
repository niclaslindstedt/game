obstacles:
  # The town's buildings are the deterministic `buildings:` block; these are the
  # loose street clutter scattered through the lane and the outskirts - low
  # jumpable cover (barrels, wagons, cacti) plus a few frontier rocks.
  - kind: eastrock
    count: 7
    radius: 9
    jumpable: false
    rockSizes:
      - - 1
        - 1
      - - 1
        - 2
      - - 2
        - 2
    cell: 16
  # Street barrels are BREAKABLE props - stove one in and it might spill what
  # it was kegging (water, moonshine): a gamble, not a supply crate's
  # guaranteed haul.
  - kind: barrel
    count: 16
    radius: 6
    jumpable: true
    breakable: true
    loot:
      chance: 0.55
      drop:
        health: 3
        stamina: 2
  # Abandoned wagons crack open too - sometimes a settler's kit is still
  # aboard, so the freight leans gear.
  - kind: wagon
    count: 7
    radius: 9
    jumpable: true
    breakable: true
    loot:
      chance: 0.35
      drop:
        gear: 2
        health: 1
        stamina: 1
  - kind: cactus
    count: 12
    radius: 6
    jumpable: true
