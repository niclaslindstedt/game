  # autopilot) can thread them without pixel-perfect lining-up — and the swing is
  # kept to ~370px centre-to-centre so the weave reads without being a marathon
  # climb. The authored `path` threads the gap centres so the autopilot (and the
  # guidance arrow) follow the intended weave instead of cutting the centre.
