description: |-
  LEVEL 1 - SPACEZ HQ. Ada's trail points off-planet and our hero builds
  spaceships for a living - but his garage ship's engine needs the one part
  SpaceZ keeps in its cleanroom, and the night shift is not letting it leave the
  building. The assembly floor is laid out like an assembly line: a serpentine of
  solid FUSELAGE-JIG AISLES with alternating end-gaps herds the player up and down
  the whole floor left-to-right, so clearing the level means walking almost every
  square of it. DOGE-1, the prototype the whole line is built to make, boots up
  under the prototype rocket in the bay past the last aisle.
  THE ONBOARDING FEEL: a gentle start that eases the player into steering and the
  loot loop (an opening-strike beat draws the weapon, early drops reward the first
  kills), then a build-and-release arc - the horde swells through the aisles,
  eases into a calm strip by the prototype where the vending-machine merchant
  waits so the player can shop, then surges for DOGE-1.
  TWO OFF-PATH DETOURS reward the player who pokes into a dead-end - the "explore
  for loot" lesson: the STOCK ROOM, a walled cul-de-sac off the last aisle
  holding a SpaceZ locker, and the BREAK ROOM, a pocket off an early aisle where
  the EMPLOYEE OF THE MONTH guards a locker of his own. Three keycard-locked
  corner vaults (starter stash, core lab, cleanroom) stay as gated story pockets
  the elites' keycards open.
campaign: true
id: spacez_hq
index: 1
name: SPACEZ HQ
prelude: prelude
music: hq_lockdown
intro:
  - - ADA WENT OUT FOR CHIPS AND
    - SODA TWO HOURS AGO.
    - SHE NEVER CAME BACK.
  - - THE TRACKER I SEWED INTO HER JACKET
    - JUST PINGED - FROM SPACE. SOMEONE
    - IS TAKING HER OFF THE PLANET.
  - - TO FOLLOW HER I NEED A SHIP. I'VE
    - BEEN BUILDING ONE IN THE GARAGE
    - FOR YEARS. IT'S ALMOST DONE.
  - - ALMOST. THE ENGINE STILL NEEDS ONE
    - PART I COULD NEVER GET. SPACEZ
    - KEEPS IT IN THEIR CLEANROOM VAULT.
  - - I KNOW, BECAUSE I WORKED THERE. I
    - BUILT THEIR ENGINES - TILL AN AI
    - LEARNED MY JOB AND THEY FIRED ME.
  - - THE WHOLE BLOCK LOST ITS JOBS
    - THE SAME WAY. NOW WE ALL LIVE
    - ON WELFARE AND MOVIE NIGHTS.
  - - THEY NEVER CHANGED THE LOCKS.
    - EVERY DOOR STILL KNOWS MY HAND.
  - - SO TONIGHT I TAKE THE PART,
    - FINISH THE SHIP, AND GO GET
    - ADA BACK.
width: 2000
height: 1200
gravity: 800
biome: spacez
tiles:
  # THREE READABLE FLOOR ZONES so the plant reads as a workplace at a glance
  # (no random patch blobs): the light lab tile is the level-wide default for the
  # OFFICES, the corner vaults and the walkways; a warm checker-plate deck floors
  # the central ASSEMBLY FLOOR; a blue rivet deck floors the LAUNCH BAY past the
  # last aisle where DOGE-1 boots up. Zones are purely visual — collision never
  # reads tiles — so the tested wall/path geometry is untouched.
  ground:
    common: lab_0
    rare: lab_1
    rareEvery: 13
  zones:
    # THE ASSEMBLY FLOOR — the central build bays, warm industrial deck plate.
    - rect:
        x: 300
        y: 0
        width: 1310
        height: 1200
      ground:
        common: vent_0
        rare: vent_1
        rareEvery: 9
    # THE LAUNCH BAY — DOGE-1's arena past the last aisle, a blue rivet deck.
    - rect:
        x: 1610
        y: 0
        width: 390
        height: 1200
      ground:
        common: deck_0
        rare: deck_1
        rareEvery: 13
heroSuited: false
foes: STAFF
# EMPLOYEE STAMPEDES — the "asteroid" beat of the assembly floor: every 20-37s a wall
# of five panicked staffers charges right-to-left across the aisles at a steady,
# heavy pace, a dust cloud boiling off its back and a line of dust telegraphing its
# lane a beat before it appears. It BOWLS any minion in its lane over (knocked out a
# few seconds, not killed — no farm) and knocks the grounded hero down (~20% hp + a
# 2s knockdown) unless he jumps it (its hitbox is a thin line, easy to hop) or steps
# out of its lane. Jumping is the intended dodge.
stampedes:
  everyMs: [20000, 36667]
  # Held back until the hero is halfway to DOGE-1: the stampedes are the
  # SECOND-HALF beat of the assembly floor, so the opening aisles — where a
  # fresh player is still learning to steer and jump — stay clear of the herd.
  afterProgress: 0.5
merchant:
  sprite: merchant_vendor
  greeting:
    - - EASY, FRIEND. I'M NOT STAFF.
      - I STOCK THE VENDING MACHINES.
      - SOMEBODY HAS TO, EVEN TONIGHT.
    - - LOCKDOWN IS A SELLER'S MARKET.
      - I'LL BUY WHAT WEIGHS YOU DOWN,
      - SELL WHAT KEEPS YOU UPRIGHT.
  returnGreeting:
    - BACK ALREADY, FRIEND?
    - THE MACHINES MISSED YOU.
