spawners:
  # THE HORDE AS SPAWN POINTS (not an endless wave): one big point per aisle
  # sweep, each arming as the hero advances into it (wide `triggerRadius` so a
  # cut corner still trips it) and DRAINING its mob count — the emitted mobs give
  # chase, so he fights and clears them ON THE MOVE, then the patch is empty and
  # he walks on. The counts are sized so clearing the sweep levels him enough to
  # finish DOGE-1 (a finite total, not a bottomless wave). The AISLE `maxAlive`
  # is a generous 20 (up from 15) so a player who WANTS to fight has a thick
  # enough crowd on screen to level on — the onboarding floor should reward
  # engaging the horde with real levels before the boss, not throttle the fight
  # down to a trickle. The OPENING knot alone is capped lower (12) so the fresh
  # starter-weapon hero is never buried before he has an AoE weapon. Each aisle also chains a lighter follow-up (`after`) that only arms
  # if he lingers — a bonus for the completionist, never a bog for the runner. The
  # mob TYPE ramps aisle to aisle (interns → scientists → engineers/guards →
  # hazmat/OPTIMUSK).
  # --- Opening: a light knot of interns the level-1 hero can actually clear to
  # find his feet — deliberately small so the opener LEVELS him instead of
  # pinning him against the first jig. ---
  # Counts sum to ~900 across the sweep (an 800–1200 "clear the whole floor"
  # battle), back-loaded so the opener stays the gentle onboarding knot and the
  # aisles swell toward the boss. The per-map XP cap (not the head-count) bounds
  # how far a clear levels the hero, so a big fight never over-levels him.
  - id: open
    at: { x: 400, y: 680 }
    # The OPENING knot is capped LOWER than the aisles (12, not 20): a fresh L1
    # hero on his bare starter weapon must be able to hold this line while he
    # learns to steer — the first level almost never kills a new player. The
    # thicker 20-wide fights come later, once the SECURITY BATON (kill ~10) has
    # given him the AoE to clear a crowd. (EASY thins this further via aliveMult.)
    maxAlive: 12
    # Easy opens at level 1 (gentle onboarding); medium/hard bite harder from the
    # first knot (higher-level interns), so standing still is never free on the
    # intended fight and up.
    ramp: vanguard
    triggerRadius: 540
    lingering: 12
    members:
      - enemy: intern
        count: 100
  # --- Aisle 1 (the first down-sweep). ---
  - id: a1
    at: { x: 560, y: 900 }
    maxAlive: 20
    ramp: meek
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: intern
        count: 70
      - enemy: scientist
        count: 50
  - after: a1
    at: { x: 600, y: 400 }
    maxAlive: 20
    ramp: meek
    members:
      - enemy: scientist
        count: 50
  # --- Aisle 2 (down-sweep). ---
  - id: a2
    at: { x: 900, y: 460 }
    maxAlive: 20
    ramp: bold
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: scientist
        count: 80
      - enemy: engineer
        count: 50
  - after: a2
    at: { x: 950, y: 860 }
    maxAlive: 20
    ramp: bold
    members:
      - enemy: engineer
        count: 40
      - enemy: guard
        count: 30
  # --- Aisle 3 (up-sweep). ---
  - id: a3
    at: { x: 1180, y: 720 }
    maxAlive: 20
    ramp: fierce
    triggerRadius: 500
    lingering: 10
    members:
      - enemy: engineer
        count: 55
      - enemy: guard
        count: 45
      - enemy: assembler
        count: 40
  - after: a3
    at: { x: 1200, y: 340 }
    maxAlive: 20
    ramp: fierce
    members:
      - enemy: guard
        count: 30
      - enemy: assembler
        count: 30
  # --- Aisle 4 (up-sweep toward the boss mouth). ---
  - id: a4
    at: { x: 1450, y: 400 }
    maxAlive: 20
    ramp: savage
    triggerRadius: 500
    lingering: 8
    members:
      - enemy: guard
        count: 45
      - enemy: hazmat
        count: 40
      - enemy: optimusk
        count: 35
      - enemy: assembler
        count: 40
  # --- The boss bay: a last surge of OPTIMUSK and ASSEMBLER units as DOGE-1 wakes. ---
  - at: { x: 1780, y: 600 }
    triggerRadius: 320
    lingering: 6
    members:
      - enemy: optimusk
        count: 40
      - enemy: assembler
        count: 30
      - enemy: hazmat
        count: 25
walls:
  # === ASSEMBLY-LINE FUSELAGE-JIG AISLES ===
  # Five full-height jig walls, each with ONE wide (~440px) pass-gap that
