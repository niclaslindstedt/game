  # THE ONBOARDING LOOT CADENCE — a deliberate difficulty CURVE, not a dump.
  # The player opens on his bare starter weapon (EASY's ranged wand) and has to
  # SURVIVE the first knot of interns on it — difficult but doable, learning to
  # steer and to keep his distance. Around kill 10, once he's found his feet, the
  # SECURITY BATON drops: his first real AoE, a cone that clears the crowd — the
  # floor eases. Around kill 20 the SMART GLASSES (+1 INT, carried passively)
  # widen that cone for free — the floor eases again — right as the aisles swell
  # toward DOGE-1, who bites hardest of all.
  earlyDrops:
    - atKills: 10
      weapon: security_baton
    - atKills: 20
      gear: smart_glasses
    # A guaranteed RANGED sidearm for the BACK HALF — the fix for the "past the
    # night manager but no further" wall: where the probabilistic rain used to
    # leave the hero stranded on a worn starter (or the feeble blaster) as the
    # aisles swell toward DOGE-1, this hands him a real kiting tool so his DPS
    # never craters. Landed around aisle 2-3.
    - atKills: [34, 46]
      weapon: nine_mm
    # A repair kit alongside it, so the freshly-armed hero can also keep his
    # weapon of choice alive through the surge instead of watching it snap.
    - atKills: [50, 64]
      item: repair
