# STRUCTURED ASSEMBLY LINES (placed + aligned, NOT scatter) — the structure that
# makes the floor read as a working factory: a conveyor belt runs down the centre
# of each of the four build bays, and half-built ships (fuselages) are stationed
# in aligned columns beside two of the lines as solid cover. Everything else is a
# deliberately LIGHT scatter on top, so the eye reads the lines first.
propLines:
  # Conveyor belts down the four build bays (flat — the hero walks the line).
  - sprite: conveyor
    from: { x: 620, y: 40 }
    to: { x: 620, y: 1160 }
    spacing: 16
  - sprite: conveyor
    from: { x: 940, y: 300 }
    to: { x: 940, y: 1160 }
    spacing: 16
  - sprite: conveyor
    from: { x: 1240, y: 40 }
    to: { x: 1240, y: 1160 }
    spacing: 16
  - sprite: conveyor
    from: { x: 1500, y: 40 }
    to: { x: 1500, y: 880 }
    spacing: 16
  # Ships on the line — colliding cover, stationed in aligned columns beside the
  # belts (clear of the aisle pass-gaps and the pinned elites).
  - sprite: fuselage
    from: { x: 690, y: 180 }
    to: { x: 690, y: 1060 }
    spacing: 440
    collide: true
    radius: 12
  - sprite: fuselage
    from: { x: 1310, y: 180 }
    to: { x: 1310, y: 1060 }
    spacing: 440
    collide: true
    radius: 12
