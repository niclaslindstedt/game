# THE LEVEL CURVE — the XP needed to cross OUT of each hero level (L → L+1),
# hand-authored per level up to the cap (`LEVELING.maxLevel`, 99). Compiled by
# `make levels` (`scripts/generate-leveling.mjs`) into
# `src/generated/leveling.ts`, which the engine's `xpToLevelUp` reads — this
# file IS the curve; there is no formula behind it anymore.
#
# UNITS — raw XP, but reason in KILLS: a rank-and-file minion of level L pays
#   LEVELING.refMobHp × (1 + LEVELING.mobXpGrowthPerLevel)^(L−1) × xpPerHp
# (45 xp at L1, COMPOUNDING 8% per level all the way to the cap — mob XP is
# level-priced, never hp-priced, so a tank and a squishy of the same level pay
# the same; a mob below the hero's level pays WoW-style reduced XP via
# `levelDiffXpMult`, greying out entirely well under him, and a mob far ABOVE
# pays a bounded premium — the compounding base clamps at hero level
# + `xpAboveClampLevels`, so cross-level kills can't power-level). The `# ~N kills`
# comment on every row is that conversion — keep it in step when editing a
# value (it is what makes the curve reviewable).
#
# APPLIED ON TOP of this table: the per-difficulty `tierLevelCostStep`
# (nightmare/jesus rungs cost more — the BALANCE › LEVEL SLOWDOWN slider).
# The ENDGAME WALL lives IN the table now (see the shape below), so
# `endgameSteepenRate` ships at 0. Golden-arrow XP (`arrowXpShare`), the
# level-difference multiplier, and the per-map XP caps all ride the same bar
# this table sets.
#
# SHAPE — required kills rise EVERY level, and the TEMPO never eases at a
# difficulty seam: the per-level effort climbs monotonically through the whole
# campaign (the per-difficulty `tierLevelCostStep` stacks its own ×1.25/×1.56
# on nightmare/jesus, so each rung is strictly slower than the one before),
# then L70+ walls up hard (tuned against `leveling-curve.mjs --targets` and
# the campaign simulator — see the `leveling-balance` skill):
#   L1–4    the classic-RPG opening, cheap (~45–49 kills) — the first ding
#           lands in under a minute. (In PLAY the opening runs quicker than
#           the kill counts suggest — above-level vanguard mobs, elite
#           bar-shares, and the arrow drip pay rich — so the SIMULATOR's
#           ding timestamps are the yardstick, not the annotations.)
#   L5–32   the bottom-lane climb, ~57 kills swelling to ~276 by the lane's
#           end — a full bottom-lane clear (with the easy/medium `xpBonus`
#           trims) lands at ~32/34/38 (easy/medium/hard) against the
#           ladder's 31/33/37, under the nightmare unlock at 40.
#   L33–69  the nightmare/jesus climb, ~284 to ~856 kills — the same steady
#           rise (each rung's landing is calibrated by its `xpBonus`, never
#           by easing this table): nightmare lands ~55 entering jesus at 58,
#           and a full jesus clear lands ~69.
#   L70–98  the ENDGAME WALL: past 70 every level costs MUCH more than the
#           ones before — ~934 kills at L70 steepening to ~5000 at L98 (with
#           the jesus tier step, hours per level) — the 76→99 grind is the
#           gear hunt, a weeks-of-play chase.
