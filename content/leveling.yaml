# THE LEVEL CURVE — the XP needed to cross OUT of each hero level (L → L+1),
# hand-authored per level up to the cap (`LEVELING.maxLevel`, 99). Compiled by
# `make levels` (`scripts/generate-leveling.mjs`) into
# `src/generated/leveling.ts`, which the engine's `xpToLevelUp` reads — this
# file IS the curve; there is no formula behind it anymore.
#
# UNITS — raw XP, but reason in KILLS: a rank-and-file minion of level L pays
#   LEVELING.refMobHp × (1 + LEVELING.mobXpGrowthPerLevel)^(L−1) × xpPerHp
# (45 xp at L1, COMPOUNDING 8% per level all the way to the cap — mob XP is
# level-priced, never hp-priced, so a tank and a squishy of the same level pay
# the same; a mob below the hero's level pays WoW-style reduced XP via
# `levelDiffXpMult`, greying out entirely well under him, and a mob far ABOVE
# pays a bounded premium — the compounding base clamps at hero level
# + `xpAboveClampLevels`, so cross-level kills can't power-level).
#
# EVERY XP FAUCET IS MOB-PRICED — kills-per-level is real. The three payouts
# below are authored HERE, as flat multiples of that same regular-mob unit, so
# nothing pays a share of the level bar and a row's kill count stays true in
# play (the old bar-share elites/arrows made real kills-per-level run ~3×
# cheaper than the annotations — measured 2026-07 with `simulate-run`):
#   arrowXpKills   — a golden arrow pays like N same-level mob kills
#   arrowDropShare — the golden-arrow slice of the drop ladder (the ladder's
#                    tail; thinned per rung by the difficulty's
#                    `arrowDropMult`, zero on JESUS). With `arrowXpKills`
#                    these two are the arrow faucet's whole dial — drop rate ×
#                    reward — tunable here without touching config. Probe a
#                    curve with the faucet OFF via `simulate-run --no-arrow-xp`.
#   eliteXpMobMult — an elite pays ×N its own mob-level XP (its `mlvl`
#                    carries its `levelBonus`, so a big elite pays more)
#   bossXpMobMult  — a boss pays ×N its own mob-level XP
# A def may still override with a flat `xp:` or its own `xpMobMult:` (the
# shielded grok trio pay ×4 each, a three-part gauntlet summing past one boss).
#
# The `# ~N kills` comment on every row is the IN-PLAY design target — what a
# player actually grinds on the critical path (medium → nightmare → jesus),
# verified against `simulate-run` ding data. The raw XP behind it embeds each
# band's measured income factor (the level-diff premium where a rung's mob
# band sits above the hero, the elite/arrow drip, and the tier step it must
# compensate), so xp ÷ reference-mob-XP does NOT equal the annotation — see
# the leveling-balance skill's calibration recipe. Keep the annotation in
# step when editing; check it with `scripts/leveling-pace.mjs`.
#
# APPLIED ON TOP of this table: the per-difficulty `tierLevelCostStep`
# (nightmare/jesus rungs cost more — the BALANCE › LEVEL SLOWDOWN slider), the
# level-difference multiplier, and the per-map XP caps.
#
# SHAPE — in-play kills-per-level open at ~20 and COMPOUND ~4.5%/level, so the
# required kills rise EVERY level (verified against `simulate-run` ding data,
# 2026-07): the first ding lands in under a minute, each following ding comes
# slower than the last, and L70+ keeps the ENDGAME WALL — every level past 70
# steepens hard over the compounding base (the 70→99 grind is the gear hunt,
# a weeks-of-play chase). The nightmare/jesus tier steps stack their own
# ×1.63/×2.64 on top, so the deep rungs are strictly slower still.

# Flat XP payouts, in regular-mob units (see UNITS above).
arrowXpKills: 5
eliteXpMobMult: 5
bossXpMobMult: 10
# The golden-arrow slice of the drop ladder (see the note above).
arrowDropShare: 0.15

