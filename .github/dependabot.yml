version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Dependency bumps touch package.json, which is not on the changeset
    # check's skip-list — the label opts them out (see
    # scripts/release/check-changeset.mjs).
    labels:
      - "dependencies"
      - "no-changelog"
