name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Include `labeled` / `unlabeled` so the `no-changelog` escape
    # hatch re-runs the changeset job when the label is toggled after
    # the PR opened. The default activity types (`opened`,
    # `synchronize`, `reopened`) would otherwise leave the check stuck
    # red until the next push.
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  # @niclaslindstedt/oss-framework is pulled from GitHub Packages, which
  # requires auth even for reads (.npmrc references GITHUB_PAT). Prefer the
  # GITHUB_PAT secret; fall back to the workflow token, which can read
  # packages in the same owner.
  GITHUB_PAT: ${{ secrets.GITHUB_PAT || github.token }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: make build
        run: make build
      - name: make test
        run: make test
      - name: make lint
        run: make lint
      - name: make fmt-check
        run: make fmt-check

  changeset:
    # Enforces that every PR touching user-visible code drops a
    # changelog fragment under .changes/unreleased/, or opts out via
    # the `no-changelog` label. Pure refactors, CI/build tweaks, and
    # docs-only edits pass via the skip-list inside the script.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check changeset fragment
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: node scripts/release/check-changeset.mjs

  # §7.1 — every tool-specific agent-guidance file must be a symlink to
  # AGENTS.md, and .claude/skills must resolve to .agent/skills. A commit that
  # dereferences one into a regular file breaks the single source of truth.
  symlinks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify agent-guidance symlinks
        run: |
          fail=0
          for link in CLAUDE.md .cursorrules .windsurfrules GEMINI.md .aider.conf.md .github/copilot-instructions.md; do
            if [ ! -L "$link" ]; then
              echo "::error file=$link::$link must be a symlink to AGENTS.md"
              fail=1
            elif [ "$(basename "$(readlink "$link")")" != "AGENTS.md" ]; then
              echo "::error file=$link::$link resolves to $(readlink "$link"), not AGENTS.md"
              fail=1
            fi
          done
          if [ ! -L .claude/skills ]; then
            echo "::error file=.claude/skills::.claude/skills must be a symlink to ../.agent/skills"
            fail=1
          fi
          exit $fail

  # Lint workflow YAML with actionlint and shell scripts with shellcheck
  # (OSS_SPEC §16.1). shellcheck is preinstalled on ubuntu-latest; actionlint
  # is fetched via its official installer.
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"
      - name: make actionlint
        run: make actionlint
      - name: make shellcheck
        run: make shellcheck
