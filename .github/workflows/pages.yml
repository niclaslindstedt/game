name: pages

# Deploys the game (the `pwa/` Vite app, built against the engine source)
# to GitHub Pages across three slots (OSS_SPEC §11.5):
#
#   /          the latest release (highest `v*` tag), or `main` until the
#              first release exists
#   /preview/  the current `main` (every push)
#   /branch/   a feature branch parked via workflow_dispatch, persisted in
#              the `branch-deploy` orphan branch so it survives later deploys
#
# Served at the custom domain configured as `siteUrl` in game.config.json
# (the identity source of truth) — a DNS CNAME on the GitHub Pages origin.
# The Pages artifact root IS the site root, so the slot directories inside
# the artifact are `.`, `preview/`, and `branch/`, matching the Vite base
# paths `/`, `/preview/`, `/branch/`.
#
# Pre-requisites: the repo's Pages source must be set to "GitHub Actions"
# and the custom domain set to `siteUrl` (Settings → Pages); the DNS CNAME
# record must point at the GitHub Pages origin (`<owner>.github.io`).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch_ref:
        description: "Optional branch to park in the stable /branch/ slot. Persists across regular deploys until the next branch_ref dispatch overwrites it."
        required: false
        type: string
        default: ""
  # Let release.yml chain into us after a release is tagged. The tag passes in
  # via `release_ref`; otherwise we resolve the highest `v*` tag in the repo.
  # Before the first release exists both lookups come up empty and we fall
  # back to serving `main` at the root slot.
  workflow_call:
    inputs:
      release_ref:
        description: "Tag or sha to build for the production slot."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  # npm ci resolves @niclaslindstedt/oss-framework from GitHub Packages.
  # Without this, the GITHUB_PAT fallback to `github.token` (see env) has
  # no package-read scope — the explicit permissions block denies
  # everything unlisted — and `npm ci` 403s whenever the npm cache is cold.
  packages: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Stable orphan branch storing the most recently dispatched /branch/
  # build. Created on demand by the first workflow_dispatch with a branch_ref;
  # every run rehydrates the branch slot from here so regular deploys
  # preserve it.
  BRANCH_DEPLOY_REF: branch-deploy
  # GitHub Packages auth for @niclaslindstedt/oss-framework (see .npmrc).
  GITHUB_PAT: ${{ secrets.GITHUB_PAT || github.token }}
  # Signs exported character archives so a hand-edited save fails to re-import
  # (see pwa/src/game/character-transfer.ts). Optional — an empty secret
  # falls back to the committed default key baked into the bundle. Set the
  # `CHARACTER_SIGNING_KEY` repo secret to rotate it. Inherited by every build
  # step (preview / root / branch) since Vite only reads VITE_-prefixed vars.
  VITE_CHARACTER_SIGNING_KEY: ${{ secrets.CHARACTER_SIGNING_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      # ---- Resolve which tag to serve at the root slot (if any) ----
      - name: Resolve production tag
        id: tag
        run: |
          if [ -n "${{ inputs.release_ref }}" ]; then
            REF="${{ inputs.release_ref }}"
          else
            # Highest semver tag, not the nearest reachable one — only
            # release.yml creates `v*` tags, so the highest is the intended
            # production release regardless of ancestry.
            REF=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          fi
          if [ -n "$REF" ]; then
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "has_release=true" >> "$GITHUB_OUTPUT"
            echo "Resolved production ref: $REF"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            echo "No release tag found — will serve main at the root slot."
          fi

      # ---- Resolve optional branch dispatch ----
      - name: Resolve branch dispatch
        id: dispatch
        run: |
          REF="${{ inputs.branch_ref }}"
          if [ -z "$REF" ]; then
            echo "has_dispatch=false" >> "$GITHUB_OUTPUT"
            echo "No branch_ref input — preserving any previously-dispatched branch build."
          else
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "has_dispatch=true" >> "$GITHUB_OUTPUT"
            echo "Dispatched: $REF -> /branch/"
          fi

      # ---- Preview build (current main) — always served at /preview/ ----
      # The preview slot tracks the triggering commit on every push. Build it
      # first, off the triggering ref, before any checkout juggling for the
      # production tag or a dispatched branch moves HEAD away.
      - name: Build preview
        run: npm run build --workspace pwa
        env:
          VITE_BASE: /preview/

      - name: Stash preview site
        run: mv pwa/dist site-preview

      # ---- Root slot build ----
      # Serves the latest release if one exists; until the first release it
      # falls back to main. Either way it is a separate build at the
      # production base path.
      - name: Checkout production tag
        if: steps.tag.outputs.has_release == 'true'
        run: git checkout ${{ steps.tag.outputs.ref }}

      - name: Reinstall deps for production tag
        if: steps.tag.outputs.has_release == 'true'
        run: npm ci

      - name: Build root
        run: npm run build --workspace pwa
        env:
          VITE_BASE: /

      - name: Stash root site
        run: mv pwa/dist site-root

      - name: Return to triggering ref
        if: steps.tag.outputs.has_release == 'true'
        run: git checkout ${{ github.sha }}

      - name: Reinstall main's deps
        if: steps.tag.outputs.has_release == 'true'
        run: npm ci

      # ---- Optional branch build + persist to orphan branch ----
      - name: Checkout dispatched ref
        if: steps.dispatch.outputs.has_dispatch == 'true'
        run: |
          git fetch origin "${{ steps.dispatch.outputs.ref }}"
          git checkout "${{ steps.dispatch.outputs.ref }}"

      - name: Reinstall deps for dispatched ref
        if: steps.dispatch.outputs.has_dispatch == 'true'
        run: npm ci

      - name: Build branch slot
        if: steps.dispatch.outputs.has_dispatch == 'true'
        run: npm run build --workspace pwa
        env:
          VITE_BASE: /branch/

      - name: Persist branch build to orphan branch
        if: steps.dispatch.outputs.has_dispatch == 'true'
        run: |
          mv pwa/dist site-branch
          STAGE=$(mktemp -d)
          cp -R site-branch/. "$STAGE/"
          # Build an orphan tree containing just the build output and
          # force-push it to BRANCH_DEPLOY_REF. Force-push is safe: the branch
          # is auto-managed and only ever written by this step. The identity
          # must be configured INSIDE the staging repo — `git init` creates a
          # fresh repo with no inherited config.
          cd "$STAGE"
          git init -q -b "$BRANCH_DEPLOY_REF"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "branch deploy: ${{ steps.dispatch.outputs.ref }} (${{ github.run_id }})"
          REMOTE_URL=$(git -C "$GITHUB_WORKSPACE" remote get-url origin)
          AUTH_URL=$(printf '%s' "$REMOTE_URL" \
            | sed "s|https://|https://x-access-token:${{ github.token }}@|")
          git remote add origin "$AUTH_URL"
          git push -f origin "HEAD:$BRANCH_DEPLOY_REF"
          cd "$GITHUB_WORKSPACE"

      - name: Return to triggering ref after dispatch build
        if: steps.dispatch.outputs.has_dispatch == 'true'
        run: git checkout ${{ github.sha }}

      # ---- Rehydrate the branch slot from the orphan branch (every run) ----
      - name: Rehydrate branch slot from orphan branch
        id: rehydrate
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH_DEPLOY_REF" >/dev/null 2>&1; then
            git fetch origin "$BRANCH_DEPLOY_REF"
            mkdir -p site-branch
            git --work-tree=site-branch checkout "origin/$BRANCH_DEPLOY_REF" -- .
            echo "has_branch_dist=true" >> "$GITHUB_OUTPUT"
            echo "Rehydrated branch slot from $BRANCH_DEPLOY_REF."
          else
            echo "has_branch_dist=false" >> "$GITHUB_OUTPUT"
            echo "$BRANCH_DEPLOY_REF branch does not exist yet — skipping branch slot."
          fi

      # ---- Merge slots into the artifact ----
      # The artifact root is the root slot (release tag, or main before the
      # first release); `preview/` always tracks the triggering commit.
      - name: Merge builds
        run: |
          mv site-root site
          mkdir -p site/preview
          cp -R site-preview/. site/preview/
          ROOT_REF="${{ steps.tag.outputs.has_release == 'true' && steps.tag.outputs.ref || 'main' }}"
          echo "Merged: /game/ = $ROOT_REF, /preview/ = ${{ github.sha }}"
          if [ "${{ steps.rehydrate.outputs.has_branch_dist }}" = "true" ]; then
            mkdir -p site/branch
            cp -R site-branch/. site/branch/
            echo "Merged: /branch/ from $BRANCH_DEPLOY_REF"
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Whichever attempt actually published reports the URL.
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      # GitHub Pages' publish backend intermittently *rejects* a fresh
      # deployment outright — "Deployment failed, try again later." on the
      # first status poll — when it is still settling the previously
      # published deploy. Our pushes land minutes apart, so this hits a
      # meaningful share of runs. The build is fine (the artifact uploaded
      # cleanly); re-creating the deployment from the *same* artifact a
      # moment later succeeds — exactly what a manual re-run does. Without
      # this retry a flaky reject on a push to main leaves `/preview` (and
      # `/`) stale on the previous commit until someone re-runs by hand,
      # which reads as "preview isn't deploying". Retry once in-job so the
      # deploy is self-healing; a second failure still fails the job so a
      # genuinely broken deploy is surfaced.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retrying a rejected deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
